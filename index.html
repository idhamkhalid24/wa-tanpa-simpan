<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, addDoc, query, where, limit, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

const firebaseConfig={apiKey:'AIzaSyAqmTEKnLKOXcmOoR9RrXksNe5_Fix42w8',authDomain:'rocky-fd14b.firebaseapp.com',projectId:'rocky-fd14b',storageBucket:'rocky-fd14b.firebasestorage.app',messagingSenderId:'861954349314',appId:'1:861954349314:web:bb8384825daedb8d34ca1b'};
const app=initializeApp(firebaseConfig), db=getFirestore(app);
const OFFICE_LOC={lat:-6.786168,lng:106.780918};
const RADIUS_LIMIT=200, MEMBER_URL='https://idhamkhalid24.github.io/kode-khusus-member/';
const SESSION='rocky_staff_compact_manual_v1', PENDING_KEY='rocky_staff_pending_sync_v2', ADMIN=['admin'];
const DEFAULT_BONUS={transactionBonusRate:.015,closingBonusPerMinute:100};
const LIMITS={tx:260,att:180,manual:120,closings:120};
const state={user:null,page:'home',pos:null,busy:false,lastSyncMs:0,syncing:false,syncError:'',data:{tx:[],att:[],closings:[],manual:[],bonus:{...DEFAULT_BONUS}}};
const $=id=>document.getElementById(id), page=$('page');

function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function key(v){return String(v||'').trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_\-.]/g,'')}
function rp(v){return Number(v||0).toLocaleString('id-ID')}
function parts(d=new Date()){return Object.fromEntries(new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Jakarta',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hourCycle:'h23'}).formatToParts(d).map(p=>[p.type,p.value]))}
function todayKey(d=new Date()){const p=parts(d);return `${p.year}-${p.month}-${p.day}`}
function monthKey(d=new Date()){return todayKey(d).slice(0,7)}
function timeNow(){const p=parts();return `${p.hour}:${p.minute}`}
function dateID(k){if(!k)return '-';const [y,m,d]=String(k).split('-');return `${d}/${m}/${y}`}
function monthID(k){if(!k)return '-';const [y,m]=String(k).split('-');return `${m}/${y}`}
function ms(r){const n=Number(r?.createdAtMs||r?.updatedAtMs||r?.deletedAtMs||0);if(n)return n;const t=r?.createdAt||r?.updatedAt||r?.deletedAt;if(t?.toMillis)return t.toMillis();if(t?.seconds)return t.seconds*1000;return 0}
function timeID(m){if(!m)return '--:--';const p=parts(new Date(m));return `${p.hour}:${p.minute}`}
function deleted(x){return x?.deleted===true||x?.deleted==='true'}
function sortDesc(a){return [...(a||[])].sort((x,y)=>ms(y)-ms(x))}
function isAdmin(u){return key(u?.role)==='admin'||ADMIN.includes(key(u?.username||u?.id))}
function isDaily(){const r=key(state.user?.role);return r==='harian'||r==='daily'||r==='karyawan_harian'}
function txDate(t){return String(t.dateKey||(ms(t)?todayKey(new Date(ms(t))):'')).slice(0,10)}
function txMonth(t){return String(t.monthKey||txDate(t).slice(0,7))}
function attDate(a){return String(a.dateKey||(ms(a)?todayKey(new Date(ms(a))):'')).slice(0,10)}
function showLoad(v){state.busy=!!v;$('loading').style.display=v?'flex':'none'}
function toast(msg){const t=$('toast');t.textContent=msg;t.className='toast show';setTimeout(()=>t.className='toast',2100)}
function modal(title,body,actions=''){const r=$('modal');r.innerHTML=`<div class="modal"><div class="modal-head"><div><div class="modal-title">${esc(title)}</div></div><button class="icon" onclick="closeModal()">×</button></div>${body}${actions?`<div class="modal-actions">${actions}</div>`:''}</div>`;r.classList.add('show')}
function closeModal(){const r=$('modal');r.classList.remove('show');r.innerHTML=''}
function getTheme(){return localStorage.getItem('rocky_staff_theme')||'light'}
function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('rocky_staff_theme',t)}
function toggleTheme(){setTheme(getTheme()==='dark'?'light':'dark');render()}
function pendingKey(){return PENDING_KEY+'_'+key(state.user?.username||'guest')}
function getPending(){try{return JSON.parse(localStorage.getItem(pendingKey())||'[]')}catch(e){return []}}
function setPending(list){localStorage.setItem(pendingKey(),JSON.stringify(list||[]))}
function pendingForUser(){const u=key(state.user?.username);return getPending().filter(x=>!u||key(x.user)===u)}
function addPending(item){const list=getPending().filter(x=>x.id!==item.id);list.push({...item,tries:Number(item.tries||0),lastTryMs:item.lastTryMs||0});setPending(list)}
function removePending(id){setPending(getPending().filter(x=>x.id!==id))}
function isPermissionError(e){return String(e?.code||e?.message||'').toLowerCase().includes('permission')}
function localTxFromPending(p){return {id:p.id,...(p.payload||{}),pending:true}}
function localAttFromPending(p){return {id:p.id,...(p.payload||{}),pending:true}}
function applyPendingToState(){const p=pendingForUser();p.forEach(x=>{if(x.type==='tx_add'&&!state.data.tx.some(t=>String(t.id)===String(x.id)))state.data.tx.unshift(localTxFromPending(x));if(x.type==='att_add'&&!state.data.att.some(a=>String(a.id)===String(x.id)))state.data.att.unshift(localAttFromPending(x))})}
function syncTimeText(){if(!state.lastSyncMs)return 'Belum sync';const diff=Math.max(0,Math.round((Date.now()-state.lastSyncMs)/1000));if(diff<60)return 'baru saja';if(diff<3600)return `${Math.floor(diff/60)} menit lalu`;return timeID(state.lastSyncMs)}
function syncBar(){const pc=pendingForUser().length, cls=pc?'syncbar sync-pending':'syncbar';const msg=pc?`<b>${pc} data belum terkirim</b><span> akan dicoba otomatis</span>`:`<span>Sync terakhir: <b>${syncTimeText()}</b></span>`;const err=state.syncError?`<div class="hint" style="color:var(--red);margin-top:2px">${esc(state.syncError)}</div>`:'';return `<div class="${cls}"><div>${msg}${err}</div><button class="btn sm" onclick="retrySync()">Sync</button></div>`}
function top(title,sub){const icon=getTheme()==='dark'?'☀':'☾';return `<div class="top"><div class="brand"><div class="title">${esc(title)}</div><div class="sub">${esc(sub||state.user?.name||'Staff')}</div></div><div class="row"><a class="btn sm member" href="${MEMBER_URL}" target="_blank" rel="noopener">Member</a><button class="btn sm" onclick="refresh()">Refresh</button><button class="btn sm" onclick="toggleTheme()">${icon}</button><button class="btn sm danger" onclick="logout()">Keluar</button></div></div>`}
function nav(){const n=$('nav'),f=$('fab');if(!state.user){n.style.display='none';f.style.display='none';return}n.style.display='flex';f.style.display='block';document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));$(`nav-${state.page}`)?.classList.add('active')}
function renderLogin(){nav();page.innerHTML=`<div class="login"><div class="login-card"><div class="hero" style="text-align:center"><div class="big">ROCKY HIJAB</div><div class="sub">Aplikasi Staff Ringan</div></div><div class="card" style="margin-top:10px"><div class="field"><div class="label">Username Staff</div><input id="lu" autocomplete="username" placeholder="username"></div><div class="field"><div class="label">PIN</div><input id="lp" type="password" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" placeholder="PIN"></div><button class="btn primary block" onclick="login()">Masuk</button></div><div class="hint" style="text-align:center;margin-top:12px">Khusus staff. Admin tidak dimuat supaya ringan. Tidak perlu ubah Firestore Rules.</div></div></div>`}
function render(){if(!state.user)return renderLogin();nav();if(state.page==='history')return history();return home()}
async function getQueryDocs(makePrimary,makeFallback){try{return await getDocs(makePrimary())}catch(e){console.warn('primary query fallback',e?.code||e);return await getDocs(makeFallback())}}
async function loadStaffData(opts={}){if(!state.user)return;const u=key(state.user.username), m=monthKey(), silent=opts.silent===true;if(!silent)showLoad(true);try{const [tx,att,manual,closeGlobal,closeUser,bs]=await Promise.all([
  getQueryDocs(()=>query(collection(db,'transactions'),where('user','==',u),where('monthKey','==',m),limit(LIMITS.tx)),()=>query(collection(db,'transactions'),where('user','==',u),limit(LIMITS.tx))),
  getDocs(query(collection(db,'attendance'),where('user','==',u),limit(LIMITS.att))),
  getQueryDocs(()=>query(collection(db,'manualBonuses'),where('user','==',u),where('monthKey','==',m),limit(LIMITS.manual)),()=>query(collection(db,'manualBonuses'),where('user','==',u),limit(LIMITS.manual))),
  getQueryDocs(()=>query(collection(db,'closings'),where('monthKey','==',m),where('scope','==','global'),limit(LIMITS.closings)),()=>query(collection(db,'closings'),where('monthKey','==',m),limit(LIMITS.closings))),
  getQueryDocs(()=>query(collection(db,'closings'),where('monthKey','==',m),where('user','==',u),limit(LIMITS.closings)),()=>query(collection(db,'closings'),where('user','==',u),limit(LIMITS.closings))),
  getDoc(doc(db,'closings','__bonus_settings'))
]);state.data.tx=sortDesc(tx.docs.map(d=>({id:d.id,...d.data()})));state.data.att=sortDesc(att.docs.map(d=>({id:d.id,...d.data()})));state.data.manual=sortDesc(manual.docs.map(d=>({id:d.id,...d.data()})));const closeMap=new Map();[...closeGlobal.docs,...closeUser.docs].forEach(d=>{if(d.id!=='__bonus_settings')closeMap.set(d.id,{id:d.id,...d.data()})});state.data.closings=[...closeMap.values()];state.data.bonus=bs.exists()?{...DEFAULT_BONUS,...bs.data()}:{...DEFAULT_BONUS};state.lastSyncMs=Date.now();state.syncError='';applyPendingToState()}catch(e){console.error(e);state.syncError='Gagal refresh data';if(!silent)toast('Gagal load data. Cek koneksi internet.');applyPendingToState()}if(!silent)showLoad(false);render();if(!opts.skipFlush)flushPending()}
async function flushPending(){if(!state.user||state.syncing)return;let list=getPending();if(!list.length)return;state.syncing=true;state.syncError='';const remain=[];for(const item of list){if(key(item.user)!==key(state.user.username)){remain.push(item);continue}try{if(item.type==='tx_add')await setDoc(doc(db,'transactions',item.id),{...(item.payload||{}),createdAt:serverTimestamp(),syncedAt:serverTimestamp(),syncedAtMs:Date.now()},{merge:true});else if(item.type==='att_add')await setDoc(doc(db,'attendance',item.id),{...(item.payload||{}),createdAt:serverTimestamp(),syncedAt:serverTimestamp(),syncedAtMs:Date.now()},{merge:true});else remain.push(item)}catch(e){console.warn('pending sync failed',e?.code||e);item.tries=Number(item.tries||0)+1;item.lastTryMs=Date.now();remain.push(item);if(isPermissionError(e)){state.syncError='Akses Firebase ditolak. Data belum bisa sync.';break}else state.syncError='Koneksi belum stabil, sync akan dicoba lagi.'}}setPending(remain);state.syncing=false;applyPendingToState();render()}
async function retrySync(){await flushPending();if(!pendingForUser().length){toast('Semua data sudah sync');await loadStaffData({silent:true,skipFlush:true})}else toast('Masih ada data menunggu sync')}
function liveTx(){return state.data.tx.filter(t=>!deleted(t))}
function todayTx(){const d=todayKey();return liveTx().filter(t=>txDate(t)===d)}
function monthTx(){const m=monthKey();return liveTx().filter(t=>txMonth(t)===m)}
function todayTotal(){return todayTx().reduce((s,t)=>s+Number(t.amount||0),0)}
function monthTotal(){return monthTx().reduce((s,t)=>s+Number(t.amount||0),0)}
function todayAtt(){const d=todayKey();return state.data.att.find(a=>!deleted(a)&&attDate(a)===d)}
function monthAttendDays(){const m=monthKey(), set=new Set();state.data.att.forEach(a=>{if(!deleted(a)&&attDate(a).startsWith(m))set.add(attDate(a))});return set.size}
function rate(){const u=state.user||{};const r=Number(u.dailyBonusRate);if(Number.isFinite(r)&&r>0)return r;const p=Number(u.dailyBonusPercent);if(Number.isFinite(p)&&p>0)return p/100;return Number(state.data.bonus.transactionBonusRate||DEFAULT_BONUS.transactionBonusRate)}
function manualBonus(){const m=monthKey();return state.data.manual.filter(b=>!deleted(b)&&String(b.monthKey||txDate(b).slice(0,7))===m).reduce((s,b)=>s+Number(b.amount||0),0)}
function activeClosings(){const m=monthKey();return state.data.closings.filter(c=>c&&c.closed===true&&c.canceled!==true&&!deleted(c)&&String(c.monthKey||c.dateKey||'').startsWith(m))}
function closingBonusValue(c){const u=key(state.user?.username);const map=c.bonusByUser||{};if(map[u]!=null)return Number(map[u]||0);if(c.scope==='user'||c.user)return key(c.user)===u?Number(c.bonusPerUser||c.totalBonus||0):0;const per=Number(c.bonusPerUser||0)||(Number(c.staffCount||0)?Number(c.totalBonus||0)/Number(c.staffCount||1):0);return per}
function closingBonus(){return activeClosings().reduce((s,c)=>s+closingBonusValue(c),0)}
function closingCount(){return activeClosings().filter(c=>closingBonusValue(c)>0).length}
function trxBonus(){return Math.round(monthTotal()*rate())}
function totalBonus(){return trxBonus()+closingBonus()+manualBonus()}
function isClosedToday(){const d=todayKey(), u=key(state.user?.username);return state.data.closings.some(c=>c&&c.closed===true&&c.canceled!==true&&!deleted(c)&&String(c.dateKey||'')===d&&((!c.user&&c.scope!=='user')||c.scope==='global'||key(c.user)===u))}
function delayMin(tm=timeNow()){const m=String(tm).match(/^(\d{1,2}):(\d{2})$/);if(!m)return 0;return Math.max(0,Number(m[1])*60+Number(m[2])-1080)}
function closingNotice(){const d=delayMin();if(!d||isClosedToday())return '';const est=d*Number(state.data.bonus.closingBonusPerMinute||0);return `<div class="card warn" style="margin-bottom:8px"><b>Estimasi bonus closing</b><div class="hint" style="margin-top:4px;color:inherit">Sudah lewat 18:00 WIB · ${d} menit · estimasi Rp ${rp(est)}</div></div>`}
function canTx(){if(isClosedToday())return false;if(isDaily())return true;return !!todayAtt()}
function statusPill(){if(isClosedToday())return `<span class="pill amber">Sudah closing</span>`;if(isDaily())return `<span class="pill blue">Karyawan harian</span>`;const a=todayAtt();return a?`<span class="pill green">Sudah absen · ${timeID(ms(a))}</span>`:`<span class="pill red">Belum absen</span>`}
function locText(){if(!state.pos)return `<button class="pill blue" onclick="updateLocation()">Ambil GPS</button>`;const dist=distance(state.pos.lat,state.pos.lng,OFFICE_LOC.lat,OFFICE_LOC.lng);return dist<=RADIUS_LIMIT?`<span class="pill green">Radius · ${Math.round(dist)}m</span>`:`<span class="pill red">Diluar · ${Math.round(dist)}m</span>`}
function txItem(t){const pending=t.pending===true;const tag=pending?'<span class="pending-tag">MENUNGGU SYNC</span>':'';return `<div class="item"><div class="main"><div class="item-title">${esc(t.note||'Transaksi')}</div><div class="item-sub">${dateID(txDate(t))} · ${timeID(ms(t))}</div>${tag}</div><div><div class="amount">Rp ${rp(t.amount)}</div>${txDate(t)===todayKey()&&!pending?`<button class="btn sm danger" style="margin-top:5px" onclick="delTx('${esc(t.id)}')">Hapus</button>`:''}</div></div>`}
function home(){const tx=todayTx(), last=sortDesc(tx).slice(0,5), a=todayAtt();page.innerHTML=`${top('Bismillah Dulu',state.user?.name||'Staff')}${syncBar()}${closingNotice()}<div class="hero"><div class="kicker">Pendapatan Hari Ini</div><div class="big">Rp ${rp(todayTotal())}</div><div class="sub">${dateID(todayKey())} · ${tx.length} transaksi</div></div><div class="grid2" style="margin-top:8px"><div class="stat"><div class="stat-label">Absen Hari Ini</div><div class="stat-val">${a?timeID(ms(a)):'--:--'}</div><div class="stat-foot">${a?'sudah absen':'belum absen'}</div></div><div class="stat"><div class="stat-label">Hadir Bulan</div><div class="stat-val">${monthAttendDays()}x</div><div class="stat-foot">${monthID(monthKey())}</div></div><div class="stat"><div class="stat-label">Transaksi</div><div class="stat-val">${tx.length}</div><div class="stat-foot">hari ini</div></div><div class="stat"><div class="stat-label">Bonus ++</div><div class="stat-val">Rp ${rp(totalBonus())}</div><div class="stat-foot">bulan ini</div></div></div><div class="card" style="margin-top:8px"><div class="between"><div><div class="label">Status Transaksi</div>${statusPill()}</div><div>${locText()}</div></div>${(!isDaily()&&!a)?`<button class="btn success block" style="margin-top:10px" onclick="clockIn()">Absen Sekarang</button>`:''}</div><div class="card" style="margin-top:8px"><div class="label">Bonus ++ Bulan Ini</div><div class="big" style="color:var(--blue)">Rp ${rp(totalBonus())}</div><div class="bonus-note">Bonus ini sudah termasuk total bonus keseluruhan</div><div class="grid2" style="margin-top:9px"><div class="stat" style="min-height:auto"><div class="stat-label">Omzet Bulan</div><div class="stat-val" style="font-size:16px">Rp ${rp(monthTotal())}</div></div><div class="stat" style="min-height:auto"><div class="stat-label">Closing</div><div class="stat-val" style="font-size:16px">${closingCount()}x</div></div></div></div><div class="card" style="margin-top:8px"><div class="between"><b>Transaksi Terakhir</b><button class="btn sm" onclick="go('history')">Lihat</button></div><div class="list" style="margin-top:8px">${last.length?last.map(txItem).join(''):'<div class="empty">Belum ada transaksi hari ini.</div>'}</div></div>`}
function history(){const items=sortDesc(todayTx());page.innerHTML=`${top('Riwayat Hari Ini',`${items.length} transaksi · Rp ${rp(todayTotal())}`)}${syncBar()}<div class="list">${items.length?items.map(txItem).join(''):'<div class="empty">Belum ada transaksi hari ini.</div>'}</div>`}
async function pinAsk(msg='Masukkan PIN'){return new Promise(res=>{window.__pin=v=>{closeModal();delete window.__pin;res(String(v||''))};modal('Verifikasi PIN',`<div class="hint" style="margin-bottom:8px">${esc(msg)}</div><input id="pinx" type="password" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" placeholder="PIN" style="text-align:center;font-size:22px;font-weight:950">`,`<button class="btn" onclick="__pin('')">Batal</button><button class="btn primary" onclick="__pin(document.getElementById('pinx').value)">Lanjut</button>`);setTimeout(()=>$('pinx')?.focus(),60)})}
function openTx(){if(!state.user)return;if(!canTx())return toast(isClosedToday()?'Transaksi sudah closing hari ini':'Absen dulu sebelum transaksi');modal('Tambah Transaksi',`<div class="field"><div class="label">Catatan</div><input id="txn" placeholder="Tulis manual..." autocomplete="off"></div><div class="field"><div class="label">Nominal</div><input id="txa" type="tel" inputmode="numeric" pattern="[0-9]*" placeholder="0" style="text-align:right;font-size:24px;font-weight:950"></div><div class="hint">Jika internet putus, transaksi disimpan lokal dan otomatis sync saat online.</div>`,`<button class="btn" onclick="closeModal()">Batal</button><button class="btn primary" onclick="saveTx()">Simpan</button>`)}
async function saveTx(){const amount=Number(String($('txa')?.value||'').replace(/\D/g,'')), note=String($('txn')?.value||'').trim()||'Transaksi';if(!amount)return toast('Nominal wajib diisi');if(!canTx()){closeModal();return toast('Absen dulu sebelum transaksi')}const now=Date.now(), u=key(state.user.username), id='stafftx_'+u+'_'+now+'_'+Math.random().toString(36).slice(2,7);const payload={user:u,name:state.user.name||u,amount,note,dateKey:todayKey(),monthKey:monthKey(),deleted:false,createdAtMs:now,createdBy:u,clientId:id,source:'staff_ringan_no_rules_change'};const local={id,...payload,pending:true};closeModal();state.data.tx=[local,...state.data.tx];render();try{await setDoc(doc(db,'transactions',id),{...payload,createdAt:serverTimestamp(),syncedAt:serverTimestamp(),syncedAtMs:Date.now()},{merge:false});state.data.tx=state.data.tx.map(t=>t.id===id?{...t,pending:false}:t);removePending(id);toast('Transaksi tersimpan');render()}catch(e){console.error(e);if(isPermissionError(e)){state.data.tx=state.data.tx.filter(t=>t.id!==id);state.syncError='Akses Firebase menolak transaksi.';toast('Akses Firebase menolak transaksi')}else{addPending({type:'tx_add',id,user:u,payload,createdAtMs:now});toast('Koneksi gagal. Disimpan lokal & akan sync otomatis.')}render()}}
async function delTx(id){const t=state.data.tx.find(x=>String(x.id)===String(id));if(!t)return toast('Transaksi tidak ditemukan');if(key(t.user)!==key(state.user.username))return toast('Tidak bisa hapus transaksi orang lain');const p=await pinAsk(`Hapus transaksi Rp ${rp(t.amount)}?`);if(!p)return;if(String(p)!==String(state.user.pin))return toast('PIN salah');showLoad(true);try{await setDoc(doc(db,'transactions',id),{deleted:true,deletedAt:serverTimestamp(),deletedAtMs:Date.now(),deletedBy:state.user.username,deletedByName:state.user.name},{merge:true});state.data.tx=state.data.tx.map(x=>String(x.id)===String(id)?{...x,deleted:true,deletedAtMs:Date.now()}:x);toast('Transaksi dihapus');await logAudit('staff_transaction_delete',{id,amount:Number(t.amount||0),note:t.note||''})}catch(e){console.error(e);toast(isPermissionError(e)?'Akses Firebase menolak hapus':'Gagal hapus transaksi')}showLoad(false);render()}
function getPosition(){return new Promise((res,rej)=>{if(!navigator.geolocation)return rej(new Error('GPS tidak tersedia'));navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lng:p.coords.longitude,accuracy:p.coords.accuracy||0}),e=>rej(e),{enableHighAccuracy:true,timeout:12000,maximumAge:0})})}
function distance(a,b,c,d){const R=6371000,rad=x=>x*Math.PI/180,da=rad(c-a),db=rad(d-b),x=Math.sin(da/2)**2+Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(db/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
async function updateLocation(){try{state.pos=await getPosition();render()}catch(e){toast('GPS gagal / izin lokasi ditolak')}}
async function clockIn(){if(todayAtt())return toast('Sudah absen hari ini');let pos=state.pos;try{if(!pos)pos=await getPosition();state.pos=pos}catch(e){return toast('GPS gagal / izin lokasi ditolak')}const dist=distance(pos.lat,pos.lng,OFFICE_LOC.lat,OFFICE_LOC.lng);if(dist>RADIUS_LIMIT)return toast(`Diluar radius (${Math.round(dist)}m)`);showLoad(true);const now=Date.now(),u=key(state.user.username),id='staffatt_'+u+'_'+todayKey()+'_'+now;const payload={user:u,name:state.user.name||u,dateKey:todayKey(),lat:pos.lat,lng:pos.lng,loc:pos,createdAtMs:now,deleted:false,clientId:id,source:'staff_ringan_no_rules_change'};try{const local={id,...payload,pending:true};state.data.att=[local,...state.data.att];render();await setDoc(doc(db,'attendance',id),{...payload,createdAt:serverTimestamp(),syncedAt:serverTimestamp(),syncedAtMs:Date.now()},{merge:false});state.data.att=state.data.att.map(a=>a.id===id?{...a,pending:false}:a);removePending(id);toast('Absen berhasil')}catch(e){console.error(e);if(isPermissionError(e)){state.data.att=state.data.att.filter(a=>a.id!==id);state.syncError='Akses Firebase menolak absen.';toast('Akses Firebase menolak absen')}else{addPending({type:'att_add',id,user:u,payload,createdAtMs:now});toast('Koneksi gagal. Absen disimpan lokal & akan sync otomatis.')}}showLoad(false);render()}
async function logAudit(action,detail={}){try{await addDoc(collection(db,'audit_logs'),{action,detail,user:state.user?.username||'',name:state.user?.name||'',createdAt:serverTimestamp(),createdAtMs:Date.now()})}catch(e){console.warn('audit skipped',e?.code||e)}}
async function login(){const u=key($('lu')?.value), p=String($('lp')?.value||'').trim();if(!u||!p)return toast('Isi username dan PIN');showLoad(true);try{const snap=await getDoc(doc(db,'users',u));if(!snap.exists())throw new Error('User tidak ditemukan');const data={id:snap.id,username:snap.data().username||snap.id,...snap.data()};if(isAdmin(data))throw new Error('Aplikasi ini khusus staff');if(data.active===false||deleted(data))throw new Error('User nonaktif');if(String(data.pin||'')!==p)throw new Error('PIN salah');state.user={username:key(data.username||u),name:data.name||u,pin:String(data.pin||''),role:data.role||'staff',dailyBonusRate:Number(data.dailyBonusRate||0),dailyBonusPercent:Number(data.dailyBonusPercent||0)};localStorage.setItem(SESSION,JSON.stringify({username:state.user.username,pin:p}));showLoad(false);await loadStaffData();toast(`Masuk: ${state.user.name}`)}catch(e){console.error(e);showLoad(false);toast(e.message||'Login gagal');renderLogin()}}
async function boot(){setTheme(getTheme());try{const s=JSON.parse(localStorage.getItem(SESSION)||'null');if(s?.username&&s?.pin){const snap=await getDoc(doc(db,'users',key(s.username)));if(snap.exists()){const data={id:snap.id,username:snap.data().username||snap.id,...snap.data()};if(!isAdmin(data)&&data.active!==false&&!deleted(data)&&String(data.pin||'')===String(s.pin)){state.user={username:key(data.username||s.username),name:data.name||s.username,pin:String(data.pin||''),role:data.role||'staff',dailyBonusRate:Number(data.dailyBonusRate||0),dailyBonusPercent:Number(data.dailyBonusPercent||0)};await loadStaffData();return}}}}catch(e){console.warn(e)}renderLogin()}
function logout(){localStorage.removeItem(SESSION);state.user=null;state.pos=null;state.syncError='';state.lastSyncMs=0;state.data={tx:[],att:[],closings:[],manual:[],bonus:{...DEFAULT_BONUS}};renderLogin()}
function go(p){state.page=p;render()}
async function refresh(){await flushPending();await loadStaffData({skipFlush:true});toast('Data diperbarui')}
function setupAutoSync(){setInterval(()=>{if(state.user&&!document.hidden&&Date.now()-state.lastSyncMs>60000)loadStaffData({silent:true})},70000);window.addEventListener('online',()=>{if(state.user){toast('Online lagi, sync dicek');flushPending();loadStaffData({silent:true})}});window.addEventListener('focus',()=>{if(state.user&&Date.now()-state.lastSyncMs>30000)loadStaffData({silent:true})});document.addEventListener('visibilitychange',()=>{if(!document.hidden&&state.user&&Date.now()-state.lastSyncMs>30000)loadStaffData({silent:true})})}
window.login=login;window.logout=logout;window.toggleTheme=toggleTheme;window.refresh=refresh;window.retrySync=retrySync;window.go=go;window.openTx=openTx;window.saveTx=saveTx;window.delTx=delTx;window.closeModal=closeModal;window.updateLocation=updateLocation;window.clockIn=clockIn;
setupAutoSync();
boot();
</script>
</body>
