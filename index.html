  <style>
    :root { --transition-theme: background .3s ease, color .3s ease, border-color .3s ease; }
    [data-theme="dark"]{

      --red:#ff6b6b; --red-dim:rgba(255,107,107,.12); --amber:#ffc46b; --amber-dim:rgba(255,196,107,.12); --nav-bg:rgba(10,13,20,.92); --shadow:0 8px 32px rgba(0,0,0,.5); --num-font:'Nunito Sans','Inter','Arial',sans-serif;
    }
    [data-theme="light"]{
      --bg:#f0f2f8; --bg2:#ffffff; --bg3:#f7f8fc; --surface:rgba(0,0,0,.03); --surface-hover:rgba(0,0,0,.055);
      --border:rgba(0,0,0,.07); --border-focus:rgba(64,120,240,.4); --text:#0f1523; --text-soft:#5c6478; --text-ghost:#aab0c0;
      --accent:#3b6df0; --accent-dim:rgba(59,109,240,.1); --accent-glow:rgba(59,109,240,.2); --green:#18a96b; --green-dim:rgba(24,169,107,.1);
      --red:#e84545; --red-dim:rgba(232,69,69,.1); --amber:#e8960a; --amber-dim:rgba(232,150,10,.1); --nav-bg:rgba(255,255,255,.92); --shadow:0 8px 32px rgba(0,0,0,.1); --num-font:'Nunito Sans','Inter','Arial',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:var(--transition-theme);-webkit-font-smoothing:antialiased}
    .stat-value,.stat-mini-num,.amount-display,.trx-amount,.trx-time{font-variant-numeric:tabular-nums lining-nums;font-feature-settings:'tnum' 1,'lnum' 1;}
    #app{max-width:430px;min-height:100vh;margin:0 auto;position:relative;background:var(--bg);overflow-x:hidden}
    [data-theme="dark"] #app::before{content:'';position:fixed;top:-120px;left:-80px;width:320px;height:320px;background:radial-gradient(circle, rgba(91,143,255,.09) 0%, transparent 70%);pointer-events:none;z-index:0}
    #page-content{position:relative;z-index:1;padding-bottom:96px}
    .page-pad{padding:0 18px}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;transition:background .15s,var(--transition-theme)}
    .page-title{font-size:24px;font-weight:800;letter-spacing:-.025em}
    .page-subtitle{font-size:12.5px;color:var(--text-soft);margin-top:2px}
    .label-xs{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-ghost);margin-bottom:10px}
    .g-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 15px;min-height:44px;line-height:1.45;font-size:14px;color:var(--text);outline:none;transition:border-color .18s,background .18s,var(--transition-theme)}
    .g-input:focus{border-color:var(--border-focus);background:var(--accent-dim)}
    .g-input::placeholder{color:var(--text-ghost)}
    .btn{border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;transition:all .14s ease;display:inline-flex;align-items:center;justify-content:center;gap:7px;letter-spacing:.01em}
    .btn:active{transform:scale(.97);opacity:.9}
    .btn:disabled{opacity:.45;pointer-events:none}
    .btn-primary{background:var(--accent);color:white;border-radius:12px;box-shadow:0 4px 18px var(--accent-glow)}
    .btn-glass{background:var(--surface);border:1px solid var(--border)!important;border-radius:12px;color:var(--text-soft)}
    .btn-danger{background:var(--red-dim);border:1px solid rgba(255,107,107,.2)!important;color:var(--red);border-radius:10px}
    .btn-success{background:linear-gradient(135deg, #16a34a, #15803d);color:white;border-radius:12px}
    .theme-toggle{width:38px;height:38px;background:var(--surface);border:1px solid var(--border);border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--text-soft);flex-shrink:0}
    .theme-btn{color:var(--amber);background:var(--amber-dim);border-color:rgba(255,196,107,.22)}
    .member-btn{color:var(--accent);background:var(--accent-dim);border-color:rgba(91,143,255,.22);text-decoration:none}
    .logout-btn{color:var(--red);background:var(--red-dim);border-color:rgba(255,107,107,.22)}
    .header-actions{display:flex;gap:8px;align-items:center}
    .stat-hero{background:linear-gradient(140deg, var(--bg3) 0%, var(--bg2) 100%);border:1px solid var(--border);border-radius:18px;padding:22px 20px;position:relative;overflow:hidden}
    [data-theme="dark"] .stat-hero{background:linear-gradient(140deg,#131d36 0%, #0d1526 100%);border-color:rgba(91,143,255,.15)}
    .stat-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:130px;height:130px;background:radial-gradient(circle, var(--accent-glow) 0%, transparent 65%);pointer-events:none}
    .stat-label{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
    .stat-value{font-family:var(--num-font);font-size:28px;font-weight:700;letter-spacing:-.03em;position:relative;z-index:1}
    .stat-sub{font-size:11.5px;color:var(--text-soft);margin-top:5px;position:relative;z-index:1}
    .stat-mini{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 14px;text-align:center}
    .stat-mini-num{font-family:var(--num-font);font-size:26px;font-weight:700;line-height:1.1}
    .stat-mini-lbl{font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-ghost);margin-bottom:5px}
    .bonus-card{border:1px solid rgba(255,196,107,.18);border-radius:16px;padding:18px 20px;position:relative;overflow:hidden}
    [data-theme="dark"] .bonus-card{background:#1a1800}[data-theme="light"] .bonus-card{background:#fffaf0}
    .bonus-card::before{content:'';position:absolute;top:-20px;right:-20px;width:90px;height:90px;background:radial-gradient(circle, rgba(255,196,107,.18) 0%, transparent 70%)}
    .modal-wrap{position:fixed;inset:0;background:rgba(5,8,16,.72);backdrop-filter:blur(14px);z-index:150;display:none;align-items:center;justify-content:center;padding:18px}
    .modal-wrap.show{display:flex}
    .modal-sheet{background:var(--bg2);border:1px solid var(--border);border-radius:24px;width:100%;max-width:392px;padding:16px 16px 18px;box-shadow:var(--shadow);animation:sheetPop .18s ease both}
    .modal-pill{width:36px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 20px}
    .modal-ico{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto 14px}
    .amount-display{font-family:var(--num-font);font-size:34px;font-weight:700;color:var(--accent);text-align:right;width:100%;background:none;border:none;outline:none}
    #bottom-nav{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:402px;background:var(--nav-bg);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:22px;display:flex;justify-content:space-around;align-items:center;height:62px;z-index:100;padding:0 6px;box-shadow:var(--shadow)}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 14px;border-radius:14px;cursor:pointer;background:none;border:none;color:var(--text-ghost);min-width:52px}
    .nav-item i{font-size:17px}.nav-item span{font-size:8.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
    .nav-item.active{background:var(--accent-dim);color:var(--accent)}

    .loc-out{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,107,107,.2)}
    .loc-loading{background:var(--surface);color:var(--text-ghost);border:1px solid var(--border)}

<body>
<div id="app">
  <div id="loading">
    <div class="loader-ring"></div>
    <p style="font-size:12px;font-weight:700;color:var(--text-soft);letter-spacing:.07em">MEMPROSES</p>
  </div>
  <div id="toast">Toast</div>

  <div id="transaction-modal" class="modal-wrap">
    <div class="modal-sheet">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px">
        <div>

          </div>
        </div>`;

  const showToast = (msg, isError = false) => {

  const sanitizeUsername = (u) => String(u || '').trim().toLowerCase();

  const getAttendanceCacheKey = (username) => `rocky_attendance_cache_${sanitizeUsername(username)}`;
  function saveAttendanceCache(username, payload) {
    if (!username) return;
    localStorage.setItem(getAttendanceCacheKey(username), JSON.stringify({
      dateKey: payload?.dateKey || toDateKey(nowDate()),
      createdAtMs: Number(payload?.createdAtMs || Date.now()),
      cachedAt: Date.now()
    }));
  }
  function readAttendanceCache(username) {
    if (!username) return null;
    try {
      const raw = localStorage.getItem(getAttendanceCacheKey(username));
      if (!raw) return null;

      if (!parsed || parsed.dateKey !== toDateKey(nowDate())) return null;
      return parsed;

  }
  function clearAttendanceCache(username) {

  function preloadAttendanceCache() {

    const cached = readAttendanceCache(currentUser.username);
    if (!cached) return false;
    const exists = cachedAttendance.some(a => a.__cached && a.dateKey === cached.dateKey && a.user === currentUser.username);
    if (!exists) {
      cachedAttendance = [{
        id: `cached_${currentUser.username}_${cached.dateKey}`,
        user: sanitizeUsername(currentUser.username),
        name: currentUser.name,
        dateKey: cached.dateKey,
        createdAtMs: cached.createdAtMs || Date.now(),

  }

  function getUserOptionsHtml(includeAll = true) {

  function getSelectedUserLabel() {

  function nowDate() { return new Date(); }
  function getWIBDate(baseDate = new Date()) {
    const parts = new Intl.DateTimeFormat('en-CA', {
      timeZone: 'Asia/Jakarta',
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: false
    }).formatToParts(baseDate).reduce((acc, part) => {
      if (part.type !== 'literal') acc[part.type] = part.value;
      return acc;
    }, {});
    return {
      year: Number(parts.year),
      month: Number(parts.month),
      day: Number(parts.day),
      hour: Number(parts.hour),
      minute: Number(parts.minute),
      second: Number(parts.second)
    };
  }
  function getBusinessDateObject(baseDate = new Date()) {
    const wib = getWIBDate(baseDate);
    return new Date(Date.UTC(wib.year, wib.month - 1, wib.day));
  }
  function toDateKey(date = new Date()) {
    const wib = getWIBDate(date);
    const y = wib.year, m = String(wib.month).padStart(2,'0'), d = String(wib.day).padStart(2,'0');
    return `${y}-${m}-${d}`;
  }
  function toMonthKey(date = new Date()) {
    const wib = getWIBDate(date);
    const y = wib.year, m = String(wib.month).padStart(2,'0');
    return `${y}-${m}`;
  }
  function getBusinessYear(date = new Date()) {
    return String(getWIBDate(date).year);
  }
  function dateToTimeInput(date) {
    return new Intl.DateTimeFormat('id-ID', { dateStyle:'short', timeStyle:'medium', timeZone:'Asia/Jakarta' }).format(date);
  }
  function formatRupiah(n) { return new Intl.NumberFormat('id-ID').format(Number(n || 0)); }
  function formatDateLabel(key) {
    if (!key) return '-';
    const [y,m,d] = key.split('-').map(Number);
    return new Date(y, m-1, d).toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' });
  }
  function extractDateKey(item) {
    if (!item) return '';
    if (item.dateKey) return String(item.dateKey).slice(0, 10);
    if (typeof item.time === 'string' && item.time.length >= 10) return item.time.slice(0, 10);
    if (typeof item.createdAt === 'string' && item.createdAt.length >= 10) return item.createdAt.slice(0, 10);
    if (item.createdAt?.toDate) return toDateKey(item.createdAt.toDate());
    if (item.createdAtMs) return toDateKey(new Date(item.createdAtMs));
    return '';
  }
  function getRecordTimeMs(item) {
    if (!item) return 0;
    if (item.createdAt?.toDate) return item.createdAt.toDate().getTime();
    if (typeof item.createdAtMs === 'number' && Number.isFinite(item.createdAtMs)) return item.createdAtMs;
    if (typeof item.time === 'string') {
      const parsed = new Date(item.time.replace(' ', 'T') + '+07:20');
      if (!Number.isNaN(parsed.getTime())) return parsed.getTime();
    }
    if (typeof item.createdAt === 'string') {
      const parsed = new Date(item.createdAt.replace(' ', 'T') + '+07:20');
      if (!Number.isNaN(parsed.getTime())) return parsed.getTime();
    }
    return 0;
  }

  function getTransactionDateKey(item) {
    if (!item) return '';
    if (item.dateKey) return String(item.dateKey).slice(0, 10);
    return extractDateKey(item);
  }
  function getTransactionMonthKey(item) {
    if (!item) return '';
    if (item.monthKey) return String(item.monthKey).slice(0, 7);
    const dateKey = getTransactionDateKey(item);
    return dateKey ? dateKey.slice(0, 7) : '';
  }
  function sortByCreatedDesc(list) {
    return [...list].sort((a,b) => getRecordTimeMs(b) - getRecordTimeMs(a));
  }
  function getTransactionBonusRate() {
    const rate = Number(cachedBonusSettings?.transactionBonusRate);

  function getTransactionBonusPercent() {

  function getClosingBonusPerMinute() {

  function calculateDistance(la1,lo1,la2,lo2){const R=6371e3,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180,a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
  function isDailyEmployee(userOrUsername) {

  function getUserTransactionBonusRate(username) {
    const user = getUserByUsername(username) || (sanitizeUsername(currentUser?.username) === sanitizeUsername(username) ? currentUser : null);
    if (isDailyEmployee(user)) {
      const customRate = Number(user?.dailyBonusRate);
      if (Number.isFinite(customRate) && customRate >= 0) return customRate;
      const customPercent = Number(user?.dailyBonusPercent);
      if (Number.isFinite(customPercent) && customPercent >= 0) return customPercent / 100;
    }
    return getTransactionBonusRate();
  }

  async function saveBonusSettings() {
    if (!isAdmin()) return showToast('Hanya admin!', true);
    if (isBusy) return showToast('Tunggu proses selesai', true);
    const trxPercentRaw = String($('bonus-trx-percent')?.value || '').replace(',', '.').trim();
    const closingRaw = String($('bonus-closing-minute')?.value || '').replace(/\D/g, '').trim();
    const trxPercent = Number(trxPercentRaw);
    const closingPerMinute = Number(closingRaw);
    if (!Number.isFinite(trxPercent) || trxPercent < 0 || trxPercent > 100) return showToast('Persen bonus transaksi tidak valid', true);
    if (!Number.isFinite(closingPerMinute) || closingPerMinute < 0) return showToast('Bonus closing per menit tidak valid', true);
    const pin = await askPin('Simpan kontrol bonus?\nMasukkan PIN admin:');
    if (!pin) return;
    if (String(pin) !== String(currentUser.pin)) return showToast('PIN salah!', true);
    setLoading(true);
    try {
      const payload = {
        transactionBonusRate: trxPercent / 100,
        transactionBonusPercent: trxPercent,
        closingBonusPerMinute: closingPerMinute,
        updatedAt: serverTimestamp(),
        updatedAtMs: Date.now(),
        updatedBy: currentUser.username,
        updatedByName: currentUser.name
      };
      await setDoc(doc(db, 'closings', '__bonus_settings'), {
        ...payload,
        id: '__bonus_settings',
        dateKey: '__bonus_settings',
        closed: false,
        type: 'bonus_settings'
      }, { merge: true });
      cachedBonusSettings = { ...cachedBonusSettings, ...payload };
      await logAudit('bonus_settings_update', { transactionBonusPercent: trxPercent, closingBonusPerMinute: closingPerMinute });
      showToast('✓ Kontrol bonus disimpan');
      await refreshCurrentPage();
    } catch (e) {
      console.error(e);
      showToast('Gagal simpan kontrol bonus: ' + (e.code || e.message || 'cek Firestore'), true);
    }
    setLoading(false);
  }

  function getTodayClosing(username = null) {
    const today = toDateKey(nowDate());
    const userKey = username ? sanitizeUsername(username) : null;
    return cachedClosings.find(c => {
      if (!c || c.dateKey !== today || c.closed !== true) return false;
      if (c.type === 'bonus_settings' || c.id === '__bonus_settings' || c.dateKey === '__bonus_settings') return false;
      const scope = c.scope || (c.user ? 'user' : 'global');
      if (!userKey) return scope === 'global' || !c.user;
      return scope === 'user' && sanitizeUsername(c.user) === userKey;
    }) || null;
  }
  function getTodayGlobalClosing() {
    return getTodayClosing(null);
  }
  function getTodayUserClosing(username = currentUser?.username) {
    return getTodayClosing(username);
  }
  function isTransactionsClosedToday(username = currentUser?.username) {
    if (isAdmin()) return false;
    return !!getTodayGlobalClosing() || !!getTodayUserClosing(username);
  }
  function isUserClosedToday(username) {
    return !!getTodayGlobalClosing() || !!getTodayUserClosing(username);
  }
  function getClosingDocId(dateKey, username = null) {

    return u ? `${dateKey}_${u}` : dateKey;

  function getClosingDelayMinutes(date = new Date()) {
    const wib = getWIBDate(date);
    const currentMinutes = (wib.hour * 60) + wib.minute;
    const deadlineMinutes = (CLOSING_DEADLINE_HOUR * 60) + CLOSING_DEADLINE_MINUTE;
    return Math.max(0, currentMinutes - deadlineMinutes);
  }
  function formatClosingDeadline() {
    return `${String(CLOSING_DEADLINE_HOUR).padStart(2,'0')}:${String(CLOSING_DEADLINE_MINUTE).padStart(2,'0')} WIB`;
  }
  function normalizeTimeLabel(value) {
    if (!value) return '';
    const raw = String(value).trim().replace('.', ':').replace(/\s*WIB$/i, '');
    const match = raw.match(/^(\d{1,2}):(\d{2})/);
    if (!match) return '';
    return `${String(Number(match[1])).padStart(2,'0')}:${match[2]}`;
  }
  function getDeadlineTimeLabel() {
    return `${String(CLOSING_DEADLINE_HOUR).padStart(2,'0')}:${String(CLOSING_DEADLINE_MINUTE).padStart(2,'0')}`;
  }
  function getClosingTimeFromDelay(delayMinutes) {
    const delay = Number(delayMinutes || 0);
    if (!Number.isFinite(delay) || delay <= 0) return '';
    const total = (CLOSING_DEADLINE_HOUR * 60) + CLOSING_DEADLINE_MINUTE + delay;
    const hour = Math.floor(total / 60) % 24;
    const minute = total % 60;
    return `${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}`;
  }
  function getCurrentWIBTimeLabel(date = new Date()) {
    const wib = getWIBDate(date);
    return `${String(wib.hour).padStart(2,'0')}:${String(wib.minute).padStart(2,'0')}`;
  }
  function getClosingDisplayTime(closing = getTodayClosing()) {
    if (!closing) return '';
    // Prioritas tile/menu Absen Hari Ini:
    // - Kalau admin EDIT jam setelah closing => pakai manualClosingTime.
    // - Kalau admin BATAL lalu CLOSING lagi => pakai jam closing terbaru / actualClosingTime,
    //   bukan manualClosingTime lama yang tersisa dari edit sebelumnya.
    const manualTime = normalizeTimeLabel(closing.manualClosingTime);
    const actualTime = normalizeTimeLabel(closing.actualClosingTime);
    const savedClosingTime = normalizeTimeLabel(closing.closingTime);
    const closedAtMs = Number(closing.closedAtMs || 0);
    const editedAtMs = Number(closing.editedAtMs || 0);
    if (manualTime && editedAtMs && (!closedAtMs || editedAtMs >= closedAtMs)) return manualTime;
    if (actualTime) return actualTime;
    const deadlineTime = getDeadlineTimeLabel();
    if (savedClosingTime && savedClosingTime !== deadlineTime) return savedClosingTime;
    const delayTime = getClosingTimeFromDelay(closing.delayMinutes);
    if (delayTime) return delayTime;
    if (closedAtMs) return new Date(closedAtMs).toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', timeZone:'Asia/Jakarta' }).replace('.', ':');
    return manualTime || savedClosingTime || '';
  }
  function parseClosingTimeInput(value) {
    const raw = String(value || '').trim().replace('.', ':');
    const match = raw.match(/^(\d{1,2}):(\d{2})$/);
    if (!match) return null;
    const hour = Number(match[1]);
    const minute = Number(match[2]);
    if (!Number.isInteger(hour) || !Number.isInteger(minute) || hour < 0 || hour > 23 || minute < 0 || minute > 59) return null;
    return { hour, minute, label: `${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}` };
  }
  function getClosingDelayMinutesFromTime(hour, minute) {
    const currentMinutes = (Number(hour) * 60) + Number(minute);
    const deadlineMinutes = (CLOSING_DEADLINE_HOUR * 60) + CLOSING_DEADLINE_MINUTE;
    return Math.max(0, currentMinutes - deadlineMinutes);
  }
  function getStaffClosingUsers() {
    return activeUsers().filter(u => sanitizeUsername(u.role || 'staff') !== 'admin' && !ADMIN_USERNAMES.includes(sanitizeUsername(u.username)));
  }
  function hasUserAttendanceOnDate(username, dateKey = toDateKey(nowDate())) {
    const target = sanitizeUsername(username || '');
    if (!target || !dateKey) return false;
    return getVisibleAttendance().some(a =>
      !isRecordDeleted(a) &&
      sanitizeUsername(a.user) === target &&
      extractDateKey(a) === dateKey
    );
  }
  function buildClosingBonusByUser(bonusValue, targetUsername = null, dateKey = toDateKey(nowDate())) {
    const target = targetUsername ? sanitizeUsername(targetUsername) : null;
    const targetUsers = target ? getStaffClosingUsers().filter(u => sanitizeUsername(u.username) === target) : getStaffClosingUsers();
    // Bonus closing hanya untuk staff biasa yang sudah absen hari ini.
    // Karyawan harian boleh di-closing oleh admin, tapi tidak dapat bonus closing.
    const bonusUsers = targetUsers.filter(u => !isDailyEmployee(u) && hasUserAttendanceOnDate(u.username, dateKey));
    const bonusByUser = bonusUsers.reduce((acc, u) => {
      acc[sanitizeUsername(u.username)] = Number(bonusValue || 0);
      return acc;
    }, {});
    const totalBonus = Object.values(bonusByUser).reduce((a,b)=>a+Number(b||0),0);
    return { users: bonusUsers, targetUsers, bonusUsers, bonusByUser, totalBonus };
  }
  function getMonthlyClosingRecords(month = toMonthKey(nowDate())) {
    return cachedClosings.filter(c => c && c.closed === true && c.type !== 'bonus_settings' && c.id !== '__bonus_settings' && c.dateKey !== '__bonus_settings' && String(c.monthKey || c.dateKey || '').startsWith(month));
  }
  function getClosingBonusPerUserDynamic(closing) {
    if (!closing || closing.closed !== true) return 0;
    const delay = Number(closing.delayMinutes || 0);
    if (!Number.isFinite(delay) || delay <= 0) return 0;
    return Math.round(delay * getClosingBonusPerMinute());
  }
  function getClosingTotalUsers(closing) {
    if (!closing) return 0;
    const stored = Number(closing.totalUsers || 0);
    if (Number.isFinite(stored) && stored > 0) return stored;
    const byUser = closing.bonusByUser || {};
    const countByUser = Object.keys(byUser).filter(k => sanitizeUsername(k) && sanitizeUsername(k) !== 'admin').length;
    if (countByUser > 0) return countByUser;
    return getStaffClosingUsers().length;
  }
  function getClosingBonusValue(closing, username = null) {
    if (!closing || closing.closed !== true) return 0;
    const byUser = closing.bonusByUser || {};
    const target = username && username !== 'all' ? sanitizeUsername(username) : null;
    if (target) return Number(byUser[target] || 0);
    if (Object.keys(byUser).length) return Object.values(byUser).reduce((a,b)=>a+Number(b||0),0);
    return Number(closing.totalBonus || 0);
  }
  function getMonthlyClosingBonus(username = null, month = toMonthKey(nowDate())) {
    return getMonthlyClosingRecords(month).reduce((sum, closing) => sum + getClosingBonusValue(closing, username), 0);
  }
  function getMonthlyManualBonuses(username = null, month = toMonthKey(nowDate())) {
    const target = username && username !== 'all' ? sanitizeUsername(username) : null;
    return (cachedManualBonuses || []).filter(b => {
      if (!b || b.deleted === true || b.deleted === 'true') return false;
      const amount = Number(b.amount || 0);
      if (!Number.isFinite(amount) || amount === 0) return false;
      const bMonth = String(b.monthKey || extractDateKey(b).slice(0, 7) || '');
      if (month && bMonth !== month) return false;
      if (target && sanitizeUsername(b.user) !== target) return false;
      return true;
    });
  }

  function getMonthlyManualBonus(username = null, month = toMonthKey(nowDate())) {
    return getMonthlyManualBonuses(username, month).reduce((sum, b) => sum + Number(b.amount || 0), 0);
  }

  function getBonusBreakdown(transactions, username = null, month = toMonthKey(nowDate())) {
    const target = username && username !== 'all' ? sanitizeUsername(username) : null;
    const monthlyTransactions = transactions.filter(t => getTransactionMonthKey(t) === month);
    const trxBonus = calculateTransactionBonusForList(monthlyTransactions);

    const manualBonus = getMonthlyManualBonus(username, month);

  }

  function getMonthlyClosingCount(username = null, month = toMonthKey(nowDate())) {

  function getMonthlyAttendancePerformance(username) {
    const month = toMonthKey(nowDate());
    const me = sanitizeUsername(username || '');
    const monthlyAtt = getVisibleAttendance().filter(a =>
      String(extractDateKey(a) || '').startsWith(month) &&
      sanitizeUsername(a.user) === me
    );
    if (!monthlyAtt.length) return null;
    // Hitung rata-rata jam absen (dalam menit dari tengah malam WIB)
    let totalMinutes = 0;
    let validCount = 0;
    for (const rec of monthlyAtt) {
      const ms = getRecordTimeMs(rec);
      if (!ms) continue;
      const wib = getWIBDate(new Date(ms));
      totalMinutes += wib.hour * 60 + wib.minute;
      validCount++;
    }
    if (!validCount) return null;
    const avgMinutes = totalMinutes / validCount;
    const avgHour = Math.floor(avgMinutes / 60);
    const avgMin = Math.floor(avgMinutes % 60);
    const avgLabel = `${String(avgHour).padStart(2,'0')}:${String(avgMin).padStart(2,'0')}`;
    // Batas: 07:20 = 420 menit. Lewat 07:20 (> 420) = perlu ditingkatkan
    const isGood = avgMinutes <= 420;
    return { avgLabel, isGood, count: validCount };
  }

  function bindRealtimeData() {
    if (!currentUser) return;
    attendanceReady = false;
    preloadAttendanceCache();
    if (unsubTransactions) unsubTransactions();
    if (unsubAttendance) unsubAttendance();
    if (unsubUsers) { unsubUsers(); unsubUsers = null; }
    if (unsubAuditLogs) { unsubAuditLogs(); unsubAuditLogs = null; }
    if (unsubClosings) { unsubClosings(); unsubClosings = null; }
    if (unsubBonusSettings) { unsubBonusSettings(); unsubBonusSettings = null; }
    if (unsubManualBonuses) { unsubManualBonuses(); unsubManualBonuses = null; }

    // Jangan pakai orderBy('createdAt') di query staff karena data lama/migrasi
    // bisa belum konsisten field createdAt-nya. Itu bikin transaksi staff kadang
    // kosong setelah clear cache/data, padahal admin masih bisa lihat.
    const tq = isAdmin()
      ? query(collection(db, 'transactions'), limit(TX_SYNC_LIMIT_ADMIN))
      : query(collection(db, 'transactions'), where('user', '==', sanitizeUsername(currentUser.username)), limit(TX_SYNC_LIMIT_STAFF));
    unsubTransactions = onSnapshot(tq, (snap) => {
      cachedTransactions = sortByCreatedDesc(
        snap.docs.map(d => ({ id: d.id, ...d.data() }))
      );
      refreshCurrentPage();
    }, async (err) => {
      console.error(err);
      try {
        const fallbackQ = isAdmin()
          ? query(collection(db, 'transactions'), limit(TX_SYNC_LIMIT_ADMIN))
          : query(collection(db, 'transactions'), where('user', '==', sanitizeUsername(currentUser.username)), limit(TX_SYNC_LIMIT_STAFF));
        const fallbackSnap = await getDocs(fallbackQ);
        cachedTransactions = sortByCreatedDesc(
          fallbackSnap.docs.map(d => ({ id: d.id, ...d.data() }))
        );
        refreshCurrentPage();
      } catch (e) {
        console.error('Fallback transaksi gagal:', e);
      }
    });

    const aq = isAdmin()
      ? query(collection(db, 'attendance'), limit(ATT_SYNC_LIMIT_ADMIN))
      : query(collection(db, 'attendance'), where('user', '==', sanitizeUsername(currentUser.username)), limit(ATT_SYNC_LIMIT_STAFF));
    unsubAttendance = onSnapshot(aq, (snap) => {
      stripCachedAttendance();
      cachedAttendance = sortByCreatedDesc(
        snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(a => !isRecordDeleted(a))
      );
      if (!isAdmin()) {
        const today = toDateKey(nowDate());
        const todayRec = cachedAttendance.find(a => extractDateKey(a) === today && sanitizeUsername(a.user) === currentUser.username);
        if (todayRec) {
          const createdAtMs = getRecordTimeMs(todayRec) || Date.now();
          saveAttendanceCache(currentUser.username, { dateKey: today, createdAtMs });
        } else {
          clearAttendanceCache(currentUser.username);
        }
      }
      attendanceReady = true;
      refreshCurrentPage();
    }, (err) => { attendanceReady = true; console.error(err); refreshCurrentPage(); });

    const cq = query(collection(db, 'closings'), limit(CLOSING_SYNC_LIMIT));
    unsubClosings = onSnapshot(cq, (snap) => {
      cachedClosings = sortByCreatedDesc(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      refreshCurrentPage();
    }, (err) => console.error('Closing listener gagal:', err));

    unsubBonusSettings = onSnapshot(doc(db, 'closings', '__bonus_settings'), (snap) => {
      if (snap.exists()) {
        const data = snap.data() || {};
        cachedBonusSettings = {
          transactionBonusRate: Number.isFinite(Number(data.transactionBonusRate)) ? Number(data.transactionBonusRate) : DEFAULT_TRANSACTION_BONUS_RATE,
          closingBonusPerMinute: Number.isFinite(Number(data.closingBonusPerMinute)) ? Number(data.closingBonusPerMinute) : DEFAULT_CLOSING_BONUS_PER_MINUTE,
          updatedAtMs: Number(data.updatedAtMs || 0),
          updatedBy: data.updatedBy || '',
          updatedByName: data.updatedByName || ''
        };
      } else {
        cachedBonusSettings = { transactionBonusRate: DEFAULT_TRANSACTION_BONUS_RATE, closingBonusPerMinute: DEFAULT_CLOSING_BONUS_PER_MINUTE };
      }
      refreshCurrentPage();
    }, (err) => console.error('Bonus settings listener gagal:', err));



    const mbq = isAdmin()
      ? query(collection(db, 'manualBonuses'), limit(MANUAL_BONUS_SYNC_LIMIT))
      : query(collection(db, 'manualBonuses'), where('user', '==', sanitizeUsername(currentUser.username)), limit(MANUAL_BONUS_SYNC_LIMIT));
    unsubManualBonuses = onSnapshot(mbq, (snap) => {
      cachedManualBonuses = sortByCreatedDesc(
        snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(b => b.deleted !== true && b.deleted !== 'true')
      );
      refreshCurrentPage();
    }, (err) => console.error('Manual bonus listener gagal:', err));

    if (isAdmin()) {
      const uq = query(collection(db, 'users'), orderBy('name'));
      unsubUsers = onSnapshot(uq, (snap) => {
        cachedUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        refreshCurrentPage();
      }, (err) => console.error(err));

      const lq = query(collection(db, 'audit_logs'), orderBy('createdAt', 'desc'), limit(AUDIT_SYNC_LIMIT));
      unsubAuditLogs = onSnapshot(lq, (snap) => {
        cachedAuditLogs = sortByCreatedDesc(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        refreshCurrentPage();
      }, (err) => console.error(err));
    } else {
      cachedUsers = currentUser ? [{ username: currentUser.username, name: currentUser.name, role: currentUser.role || 'staff', dailyBonusRate: Number(currentUser.dailyBonusRate || 0), dailyBonusPercent: Number(currentUser.dailyBonusPercent || 0), active: true }] : [];
      cachedAuditLogs = [];
    }

    applyNavRoleLabels();
  }

  function updateLocation() {
    const info = $('loc-info'); if (!info) return;
    info.innerHTML = `<span class="loc-chip loc-loading"><i class="fas fa-circle-notch fa-spin" style="font-size:10px"></i> Mencari GPS...</span>`;
    if (!navigator.geolocation) {
      info.innerHTML = `<span class="loc-chip loc-out"><i class="fas fa-xmark"></i> GPS tidak didukung</span>`; return;
    }
    navigator.geolocation.getCurrentPosition(pos => {
      currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      const dist = calculateDistance(currentPos.lat, currentPos.lng, OFFICE_LOC.lat, OFFICE_LOC.lng);
      info.innerHTML = dist <= RADIUS_LIMIT
        ? `<span class="loc-chip loc-in"><i class="fas fa-circle" style="font-size:6px"></i> Dalam Radius · ${Math.round(dist)}m</span>`
        : `<span class="loc-chip loc-out"><i class="fas fa-xmark"></i> Diluar Radius · ${Math.round(dist)}m</span>`;
      updateHomeStatus();
    }, () => {
      info.innerHTML = `<span class="loc-chip loc-out"><i class="fas fa-triangle-exclamation"></i> Gagal ambil lokasi</span>`;
    }, { enableHighAccuracy:true, timeout:10000, maximumAge:30000 });
  }

    return '--:--';

  }

    const sourceTransactions = isAdmin() && selectedUserFilter !== 'all'
      ? visibleTransactions.filter(t => t.user === selectedUserFilter)

    const pendapatanHariIni = sourceTransactions.filter(t => extractDateKey(t) === today).reduce((a,b)=>a+Number(b.amount||0),0);
    const omzetBulanan = sourceTransactions.filter(t => t.monthKey === month).reduce((a,b)=>a+Number(b.amount||0),0);
    const bonusScopeUser = isAdmin() ? (selectedUserFilter !== 'all' ? selectedUserFilter : null) : currentUser.username;
    const bonusBreakdown = getBonusBreakdown(sourceTransactions, bonusScopeUser, month);
    const dailyMode = !isAdmin() && isDailyEmployee(currentUser);
    const dailyPay = dailyMode ? getDailyEmployeeTodaySalary(currentUser.username, today) : null;
    const rec = sortByCreatedDesc(sourceAttendance.filter(a => extractDateKey(a) === today))[0] || null;

  function getFilteredTransactions() {
    const visible = getVisibleTransactions();
    const source = isAdmin() && selectedUserFilter !== 'all' ? visible.filter(t => t.user === selectedUserFilter) : visible;
    const today = toDateKey(nowDate());
    const month = toMonthKey(nowDate());
    const year = getBusinessYear(nowDate());
    if (historyFilter === 'daily') return source.filter(t => getTransactionDateKey(t) === today);
    if (historyFilter === 'monthly') return source.filter(t => getTransactionMonthKey(t) === month);
    if (historyFilter === 'yearly') return source.filter(t => String(getTransactionDateKey(t) || '').startsWith(year));
    if (historyFilter === 'range' && rangeStartDate && rangeEndDate) return source.filter(t => { const dateKey = getTransactionDateKey(t); return dateKey >= rangeStartDate && dateKey <= rangeEndDate; });
    return source;
  }

  async function saveAdminUser() {
    if (!isAdmin()) return showToast('Hanya admin!', true);
    if (isBusy) return showToast('Tunggu proses selesai', true);
    const username = sanitizeUsername($('admin-user-username')?.value);
    const name = String($('admin-user-name')?.value || '').trim();
    const pin = String($('admin-user-pin')?.value || '').trim();
    const role = String($('admin-user-role')?.value || 'staff').trim().toLowerCase();
    const dailyPercentRaw = String($('admin-user-daily-percent')?.value || '').replace(',', '.').trim();
    const dailyBonusPercent = dailyPercentRaw === '' ? 0 : Number(dailyPercentRaw);
    if (!username || !name || !pin) return showToast('Lengkapi username, nama, dan PIN!', true);
    if (!/^[a-z0-9_-]{3,30}$/.test(username)) return showToast('Username hanya boleh huruf kecil, angka, _ atau - (min 3)', true);
    if (name.length < 2) return showToast('Nama terlalu pendek', true);
    if (pin.length < 3) return showToast('PIN minimal 3 digit/karakter', true);
    if (!['admin','staff','harian'].includes(role)) return showToast('Role tidak valid!', true);
    if (!Number.isFinite(dailyBonusPercent) || dailyBonusPercent < 0 || dailyBonusPercent > 100) return showToast('Persentase karyawan harian tidak valid', true);
    setLoading(true);
    try {
      const ref = doc(db, 'users', username);
      const snap = await getDoc(ref);
      const existing = snap.exists() ? snap.data() : null;
      await setDoc(ref, {
        username,
        name,
        pin,
        role,
        dailyBonusRate: role === 'harian' ? dailyBonusPercent / 100 : 0,
        dailyBonusPercent: role === 'harian' ? dailyBonusPercent : 0,
        active: true,
        updatedAt: serverTimestamp(),
        updatedBy: currentUser.username,
        createdAt: existing?.createdAt || serverTimestamp()
      }, { merge: true });
      await logAudit('user_upsert', { username, role, existed: !!existing });
      showToast(existing ? '✓ User diperbarui' : '✓ User ditambahkan');
      selectedUserFilter = username;
      clearAdminUserForm();
      await renderSettingsSummary();
    } catch (e) {
      console.error(e);
      showToast('Gagal simpan user', true);
    }
    setLoading(false);
  }

  async function deleteAdminUser() {
    if (!isAdmin()) return showToast('Hanya admin!', true);
    if (isBusy) return showToast('Tunggu proses selesai', true);
    const username = sanitizeUsername($('admin-user-select')?.value || $('admin-user-username')?.value);
    if (!username) return showToast('Pilih user dulu!', true);
    if (sanitizeUsername(currentUser?.username) === username) return showToast('Tidak bisa nonaktifkan akun admin yang sedang dipakai!', true);
    const user = getUserByUsername(username);
    if (!confirm(`Nonaktifkan user ${user?.name || username} (@${username})? Data transaksi dan absensi tetap disimpan.`)) return;
    setLoading(true);
    try {
      await setDoc(doc(db, 'users', username), {
        active: false,
        deleted: true,
        deletedAt: serverTimestamp(),
        deletedAtMs: Date.now(),
        deletedBy: currentUser.username
      }, { merge: true });
      if (selectedUserFilter === username) selectedUserFilter = 'all';
      clearAdminUserForm();
      await logAudit('user_soft_delete', { username });
      showToast(`✓ User ${username} dinonaktifkan`);
      await renderSettingsSummary();
      await refreshCurrentPage();
    } catch (e) {
      console.error(e);
      showToast('Gagal nonaktifkan user', true);
    }
    setLoading(false);
  }

  async function hardDeleteAdminUser() {
    if (!isAdmin()) return showToast('Hanya admin!', true);
    if (isBusy) return showToast('Tunggu proses selesai', true);
    const username = sanitizeUsername($('admin-user-select')?.value || $('admin-user-username')?.value);
    if (!username) return showToast('Pilih user dulu!', true);
    if (sanitizeUsername(currentUser?.username) === username) return showToast('Tidak bisa hapus permanen akun yang sedang dipakai!', true);
    const user = getUserByUsername(username);
    if (!user) return showToast('User tidak ditemukan!', true);
    if (isUserActive(user)) return showToast('Nonaktifkan user dulu sebelum hapus permanen!', true);
    const pin = await askPin(`HAPUS PERMANEN user ${user?.name || username} (@${username})?\nKetik PIN admin:`);
    if (!pin) return;
    if (String(pin) !== String(currentUser.pin)) return showToast('PIN salah!', true);
    if (!confirm('Akun user akan dihapus permanen. Data transaksi dan absensi user tetap disimpan untuk arsip. Lanjutkan?')) return;
    setLoading(true);
    try {
      await deleteDoc(doc(db, 'users', username));
      if (selectedUserFilter === username) selectedUserFilter = 'all';
      clearAdminUserForm();
      await logAudit('user_hard_delete', { username });
      showToast(`✓ User ${username} dihapus permanen`);
      await renderSettingsSummary();
      await refreshCurrentPage();
    } catch (e) {
      console.error(e);
      showToast('Gagal hapus permanen user', true);
    }
    setLoading(false);
  }

  function serializeTimestamp(value) {
    if (!value) return null;
    if (value.toDate) return value.toDate().toISOString();
    if (typeof value === 'string') return value;
    return null;
  }

    return {

          active: u.active !== false, createdAt: serializeTimestamp(u.createdAt) || null
        })),

        })),

          createdAtMs: t.createdAt?.toDate ? t.createdAt.toDate().getTime() : (t.createdAtMs || Date.now())
        }))

    };
  }

  function downloadTextFile(content, filename, mimeType = 'text/plain;charset=utf-8') {
    const blob = new Blob([content], { type: mimeType });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  function csvEscape(value) {
    const s = String(value ?? '');
    if (/[",\n]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
    return s;
  }

  function toCsv(rows, headers) {
    const lines = [headers.join(',')];
    for (const row of rows) lines.push(headers.map(h => csvEscape(row[h])).join(','));
    return lines.join('\n');
  }

  function parseCsv(text) {
    const rows = [];
    let row = [], value = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      const next = text[i + 1];
      if (inQuotes) {
        if (c === '"' && next === '"') { value += '"'; i++; }
        else if (c === '"') inQuotes = false;
        else value += c;
      } else {
        if (c === '"') inQuotes = true;
        else if (c === ',') { row.push(value); value = ''; }
        else if (c === '\n') { row.push(value); rows.push(row); row = []; value = ''; }
        else if (c === '\r') { }
        else value += c;
      }
    }
    if (value.length || row.length) { row.push(value); rows.push(row); }
    if (!rows.length) return [];
    const headers = rows[0].map(x => String(x || '').trim());
    return rows.slice(1).filter(r => r.some(cell => String(cell || '').trim() !== '')).map(r => {
      const obj = {};
      headers.forEach((h, idx) => obj[h] = r[idx] ?? '');
      return obj;
    });
  }

  function normalizeBackupShape(raw) {
    if (!raw) throw new Error('Backup kosong');
    if (raw.data && typeof raw.data === 'object') return raw;
    return {
      version: raw.version || 'legacy-import',
      exportedAt: raw.exportedAt || new Date().toISOString(),
      data: {
        users: Array.isArray(raw.users) ? raw.users : [],
        attendance: Array.isArray(raw.attendance) ? raw.attendance : [],
        transactions: Array.isArray(raw.transactions) ? raw.transactions : []
      }
    };
  }


  function getRestoreProFileKind(file) {
    if (!file) return '';
    const name = String(file.name || '').toLowerCase();
    if (name.endsWith('.json') || file.type === 'application/json') return 'json';
    if (name.endsWith('.xlsx') || name.endsWith('.xls') || String(file.type || '').includes('spreadsheet') || String(file.type || '').includes('excel')) return 'excel';
    return '';
  }

        const buffer = await file.arrayBuffer();

              username: sanitizeUsername(u.username || u.user || u.Username || u.USERNAME),

              pin: String(u.pin || u.PIN || u.password || ''),
              role: String(u.role || u.Role || 'staff'),

              dateKey: String(a.dateKey || a.date || a.tanggal || a.Date || '').slice(0, 10),
              lat: (a.lat ?? a.latitude ?? '') === '' ? null : Number(a.lat ?? a.latitude),
              lng: (a.lng ?? a.longitude ?? '') === '' ? null : Number(a.lng ?? a.longitude),
              createdAt: a.createdAt || a.time || a.waktu || null,
              createdAtMs: Number(a.createdAtMs || 0)
            })).filter(a => a.user),
            transactions: pickSheetRows(['transactions','transaction','transaksi','Transactions']).map(t => ({
              user: sanitizeUsername(t.user || t.username || t.User || t.Username),
              name: String(t.name || t.nama || t.Name || t.user || t.username || ''),
              note: String(t.note || t.item || t.keterangan || t.barang || 'Transaksi'),
              amount: Number(t.amount || t.harga || t.nominal || t.total || 0),
              dateKey: String(t.dateKey || t.date || t.tanggal || '').slice(0, 10),
              monthKey: String(t.monthKey || '').slice(0, 7),

            })).filter(t => t.user)

      showToast(`✓ Restore ${kind.toUpperCase()} selesai: ${result.users.length} user, ${result.attendance.length} absen, ${result.transactions.length} transaksi`);

  async function downloadBackup(format = 'json') {
    if (!isAdmin()) return showToast('Hanya admin!', true);
    setLoading(true);
    try {
      const backup = getBackupPayload();
      const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
      if (format === 'json') {
        downloadTextFile(JSON.stringify(backup, null, 2), `rocky-backup-${stamp}.json`, 'application/json');
        showToast('✓ Backup JSON diunduh');
      } else if (format === 'xlsx') {
        if (!window.XLSX) throw new Error('Library Excel belum siap');
        const wb = XLSX.utils.book_new();
        const usersRows = backup.data.users.map(u => ({
          username: u.username || '',
          name: u.name || '',
          pin: u.pin || '',
          role: u.role || 'staff',
          dailyBonusPercent: Number(u.dailyBonusPercent || (Number(u.dailyBonusRate || 0) * 100) || 0),
          createdAt: u.createdAt || ''
        }));
        const attendanceRows = backup.data.attendance.map(a => ({
          user: a.user || '',
          name: a.name || '',
          dateKey: a.dateKey || '',
          lat: a.lat ?? '',
          lng: a.lng ?? '',
          createdAt: a.createdAt || '',
          createdAtMs: a.createdAtMs || ''
        }));
        const transactionRows = backup.data.transactions.map(t => ({
          user: t.user || '',
          name: t.name || '',
          note: t.note || '',
          amount: Number(t.amount || 0),
          dateKey: t.dateKey || '',
          monthKey: t.monthKey || '',
          createdAt: t.createdAt || '',
          createdAtMs: t.createdAtMs || ''
        }));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(usersRows), 'users');
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(attendanceRows), 'attendance');
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(transactionRows), 'transactions');
        XLSX.writeFile(wb, `rocky-backup-${stamp}.xlsx`);
        showToast('✓ Backup Excel diunduh');
      }
    } catch (e) {
      console.error(e);
      showToast('Gagal backup', true);
    }
    setLoading(false);
  }

  async function importBackupData(backup) {
    const users = Array.isArray(backup.data.users) ? backup.data.users : [];
    const attendance = Array.isArray(backup.data.attendance) ? backup.data.attendance : [];
    const transactions = Array.isArray(backup.data.transactions) ? backup.data.transactions : [];
    for (const u of users) {
      const username = sanitizeUsername(u.username);
      if (!username) continue;
      await setDoc(doc(db, 'users', username), {
        username,
        name: String(u.name || username),
        pin: String(u.pin || ''),
        role: String(u.role || 'staff'),
        dailyBonusRate: Number(u.dailyBonusRate || 0) || (Number(u.dailyBonusPercent || 0) / 100),
        dailyBonusPercent: Number(u.dailyBonusPercent || 0) || (Number(u.dailyBonusRate || 0) * 100),
        active: u.active !== false,
        createdAt: u.createdAt ? Timestamp.fromMillis(new Date(u.createdAt).getTime()) : serverTimestamp()
      }, { merge: true });
    }
    for (const a of attendance) {
      const ms = Number(a.createdAtMs || (a.createdAt ? new Date(a.createdAt).getTime() : Date.now()));
      await addDoc(collection(db, 'attendance'), {
        user: sanitizeUsername(a.user),
        name: String(a.name || a.user || ''),
        dateKey: String(a.dateKey || ''),
        lat: a.lat ?? null,
        lng: a.lng ?? null,
        createdAt: Timestamp.fromMillis(ms),
        createdAtMs: ms,
        deleted: false
      });
    }
    for (const t of transactions) {
      const ms = Number(t.createdAtMs || (t.createdAt ? new Date(t.createdAt).getTime() : Date.now()));
      await addDoc(collection(db, 'transactions'), {
        user: sanitizeUsername(t.user),
        name: String(t.name || t.user || ''),
        note: String(t.note || 'Transaksi'),
        amount: Number(t.amount || 0),
        dateKey: String(t.dateKey || ''),
        monthKey: String(t.monthKey || ''),
        createdAt: Timestamp.fromMillis(ms),
        createdAtMs: ms,
        deleted: false
      });
    }
    return { users, attendance, transactions };
  }

  async function normalizeLegacyData() {
    if (!isAdmin()) return showToast('Hanya admin!', true);
    if (isBusy) return showToast('Tunggu proses selesai', true);
    if (!confirm('Normalisasi data lama? Ini akan menambah field dateKey/monthKey/createdAtMs yang belum ada.')) return;
    setLoading(true);
    try {
      let updated = 0;
      const userSnap = await getDocs(collection(db, 'users'));
      for (const item of userSnap.docs) {
        const data = item.data() || {};
        const patch = {};
        if (data.active === undefined) patch.active = true;
        if (data.username && data.username !== sanitizeUsername(data.username)) patch.username = sanitizeUsername(data.username);
        if (Object.keys(patch).length) {
          await setDoc(doc(db, 'users', item.id), patch, { merge: true });
          updated++;
        }
      }

      const attSnap = await getDocs(collection(db, 'attendance'));
      for (const item of attSnap.docs) {
        const data = item.data() || {};
        const patch = {};
        const ms = getRecordTimeMs(data);
        const dk = extractDateKey(data);
        if (!data.user && data.username) patch.user = sanitizeUsername(data.username);
        if (!data.dateKey && dk) patch.dateKey = dk;
        if (!data.createdAtMs && ms) patch.createdAtMs = ms;
        if (Object.keys(patch).length) {
          await setDoc(doc(db, 'attendance', item.id), patch, { merge: true });
          updated++;
        }
      }

      const trxSnap = await getDocs(collection(db, 'transactions'));
      for (const item of trxSnap.docs) {
        const data = item.data() || {};
        const patch = {};
        const ms = getRecordTimeMs(data);
        const dk = extractDateKey(data);
        if (!data.dateKey && dk) patch.dateKey = dk;
        if (!data.monthKey && dk) patch.monthKey = dk.slice(0, 7);
        if (!data.createdAtMs && ms) patch.createdAtMs = ms;
        if (data.deleted === undefined) patch.deleted = false;
        if (Object.keys(patch).length) {
          await setDoc(doc(db, 'transactions', item.id), patch, { merge: true });
          updated++;
        }
      }

      await logAudit('normalize_legacy_data', { updated });
      showToast(`✓ Normalisasi selesai (${updated} update)`);
      await renderSettingsSummary();
      await refreshCurrentPage();
    } catch (e) {
      console.error(e);
      showToast('Gagal normalisasi data', true);
    }
    setLoading(false);
  }

  function handleStaffSwipeStart(e) {
    if (!currentUser || isAdmin()) return;
    const touch = e.touches && e.touches[0];
    if (!touch) return;
    staffSwipeStartX = touch.clientX;
    staffSwipeStartY = touch.clientY;
    staffSwipeStartT = Date.now();
  }

  function handleStaffSwipeEnd(e) {
    if (!currentUser || isAdmin()) return;
    if (!['home','history'].includes(currentPage)) return;
    const touch = e.changedTouches && e.changedTouches[0];
    if (!touch || !staffSwipeStartT) return;
    const dx = touch.clientX - staffSwipeStartX;
    const dy = touch.clientY - staffSwipeStartY;

  window.hardDeleteAdminUser = hardDeleteAdminUser;
  window.downloadBackup = downloadBackup;
  window.restoreBackupFromFile = restoreBackupFromFile;
  window.restoreExcelFromFile = restoreExcelFromFile;
  window.handleRestoreProFile = handleRestoreProFile;
  window.clearRestoreProFile = clearRestoreProFile;
  window.restoreProFromFile = restoreProFromFile;
  window.resetAllAppData = resetAllAppData;
  window.normalizeLegacyData = normalizeLegacyData;
  window.router = router;
  window.updateLocation = updateLocation;

  async function refreshTransactionsNow() {
    if (!currentUser) return;
    try {
      const qy = isAdmin()
        ? query(collection(db, 'transactions'), limit(TX_SYNC_LIMIT_ADMIN))
        : query(collection(db, 'transactions'), where('user', '==', sanitizeUsername(currentUser.username)), limit(TX_SYNC_LIMIT_STAFF));
      const snap = await getDocs(qy);
      cachedTransactions = sortByCreatedDesc(
        snap.docs.map(d => ({ id: d.id, ...d.data() }))
      );
      const closingSnap = await getDocs(query(collection(db, 'closings'), limit(CLOSING_SYNC_LIMIT)));
      cachedClosings = sortByCreatedDesc(closingSnap.docs.map(d => ({ id: d.id, ...d.data() })));
      const manualBonusQuery = isAdmin()
        ? query(collection(db, 'manualBonuses'), limit(MANUAL_BONUS_SYNC_LIMIT))
        : query(collection(db, 'manualBonuses'), where('user', '==', sanitizeUsername(currentUser.username)), limit(MANUAL_BONUS_SYNC_LIMIT));
      const manualBonusSnap = await getDocs(manualBonusQuery);
      cachedManualBonuses = sortByCreatedDesc(manualBonusSnap.docs.map(d => ({ id: d.id, ...d.data() })));
      const bonusSnap = await getDoc(doc(db, 'closings', '__bonus_settings'));
      if (bonusSnap.exists()) {
        const data = bonusSnap.data() || {};
        cachedBonusSettings = {
          transactionBonusRate: Number.isFinite(Number(data.transactionBonusRate)) ? Number(data.transactionBonusRate) : DEFAULT_TRANSACTION_BONUS_RATE,
          closingBonusPerMinute: Number.isFinite(Number(data.closingBonusPerMinute)) ? Number(data.closingBonusPerMinute) : DEFAULT_CLOSING_BONUS_PER_MINUTE,
          updatedAtMs: Number(data.updatedAtMs || 0),
          updatedBy: data.updatedBy || '',
          updatedByName: data.updatedByName || ''
        };
      }
      refreshCurrentPage();
    } catch (e) {
      console.error('refreshTransactionsNow gagal:', e);
    }
  }

  window.addEventListener('online', () => { renderSettingsSummary(); if (currentUser) bindRealtimeData(); });
  window.addEventListener('offline', () => renderSettingsSummary());
  let lastForegroundRefreshAt = 0;
  async function refreshForegroundData() {
    if (!currentUser) return;
    const now = Date.now();
    if (now - lastForegroundRefreshAt < 1500) return;
    lastForegroundRefreshAt = now;
    preloadAttendanceCache();
    refreshCurrentPage();
    await refreshTransactionsNow();
  }

  document.addEventListener('visibilitychange', async () => {
    if (!document.hidden && currentUser) await refreshForegroundData();
  });
  window.addEventListener('focus', async () => {
    if (currentUser) await refreshForegroundData();
  });

  if (restoreSession()) router.navigate('home');
  else router.navigate('login');
</script>
</body>
</html>
