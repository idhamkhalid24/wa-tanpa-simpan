<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>WA Mobile · Kirim Pesan & File + Riwayat IndexedDB</title>
    <style>
        /* RESET & FONT OPTIMAL UNTUK ANDROID */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            background: #d2e4ec; /* fallback */
            background: linear-gradient(145deg, #cde1eb 0%, #b6d2e0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            margin: 0;
            /* optimasi untuk layar kecil */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* KONTENER UTAMA */
        .app-wrapper {
            width: 100%;
            max-width: 480px; /* lebar ideal hp, tidak terlalu lebar */
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* KARTU UTAMA & KARTU RIWAYAT */
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 36px;
            box-shadow: 0 20px 40px -12px rgba(0, 60, 50, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.6) inset;
            padding: 24px 20px 28px;
            width: 100%;
            border: none;
        }

        /* HEADER DENGAN LOGO */
        .header-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }
        .wa-icon {
            background: #25D366;
            width: 60px;
            height: 60px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 20px -8px rgba(37, 211, 102, 0.5);
            flex-shrink: 0;
        }
        .wa-icon svg {
            width: 34px;
            height: 34px;
            fill: white;
        }
        .title-group h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #0b303b;
            line-height: 1.1;
        }
        .title-group .db-indicator {
            background: #2d7e8f;
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 6px;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        /* FORM INPUT */
        .input-section {
            margin-bottom: 18px;
        }
        .label {
            font-size: 0.8rem;
            font-weight: 650;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #1b5a6b;
            margin-left: 12px;
            margin-bottom: 6px;
            display: block;
        }
        .phone-field {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 60px;
            padding: 4px 4px 4px 16px;
            box-shadow: 0 6px 14px rgba(0, 40, 30, 0.08), 0 0 0 1.5px rgba(0, 0, 0, 0.02) inset;
        }
        .country-code {
            background: #e2f1f7;
            border-radius: 50px;
            padding: 10px 16px;
            font-weight: 600;
            color: #105e73;
            font-size: 1rem;
            margin-right: 8px;
            white-space: nowrap;
        }
        .phone-field input {
            flex: 1;
            border: none;
            padding: 14px 8px 14px 0;
            font-size: 1.1rem;
            background: transparent;
            outline: none;
            color: #0a2d38;
            font-weight: 500;
            min-width: 0;
        }
        .phone-field input::placeholder {
            color: #9ebecb;
            font-weight: 400;
        }

        /* CHIP NEGARA */
        .chip-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            margin-left: 6px;
            flex-wrap: wrap;
        }
        .chip {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 50px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 550;
            color: #1c6277;
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 2px 6px rgba(0, 30, 20, 0.02);
            transition: all 0.1s;
            -webkit-touch-callout: none;
            cursor: pointer;
        }
        .chip.active {
            background: #25D366;
            color: white;
            border-color: #25D366;
            box-shadow: 0 8px 14px -6px #25D36699;
        }

        /* TEXTAREA PESAN */
        .message-area {
            width: 100%;
            padding: 18px 20px;
            border: none;
            border-radius: 32px;
            font-size: 1rem;
            background: white;
            box-shadow: 0 6px 14px rgba(0, 30, 20, 0.04), 0 0 0 1.5px rgba(0,0,0,0.02) inset;
            resize: none;
            font-family: inherit;
            margin: 12px 0 8px;
            outline: none;
            line-height: 1.4;
        }

        /* AREA FILE (MOBILE FRIENDLY) */
        .file-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 18px 18px 20px;
            margin: 16px 0 12px;
            border: 2px dashed #25D36699;
        }
        .file-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .file-header svg {
            fill: #1f8ca5;
            width: 26px;
            height: 26px;
        }
        .file-header span {
            font-weight: 650;
            color: #115262;
            font-size: 1rem;
        }
        .file-picker {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .file-btn {
            background: #25D366;
            border: none;
            color: white;
            padding: 14px 22px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 18px -6px #25D36699;
            cursor: pointer;
            border: none;
            -webkit-touch-callout: none;
        }
        .file-btn:active {
            background: #1fa955;
            transform: scale(0.98);
        }
        #file-info {
            color: #115e73;
            background: rgba(255,255,255,0.7);
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
            flex: 1;
        }
        .file-list-panel {
            margin-top: 18px;
            background: rgba(255,255,255,0.7);
            border-radius: 26px;
            padding: 12px 14px;
            max-height: 130px;
            overflow-y: auto;
            font-size: 0.9rem;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .remove-file {
            background: none;
            border: none;
            color: #d14;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 0 6px;
            cursor: pointer;
        }
        .clear-all-files {
            background: none;
            border: none;
            color: #bf4240;
            font-weight: 600;
            text-decoration: underline dotted;
            padding: 10px 0 4px;
            font-size: 0.9rem;
            width: 100%;
            text-align: right;
        }

        /* TOMBOL AKSI */
        .button-row {
            display: flex;
            gap: 14px;
            margin: 20px 0 10px;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1 1 auto;
            padding: 18px 14px;
            border-radius: 60px;
            border: none;
            font-weight: 680;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: white;
            color: #185f73;
            box-shadow: 0 8px 18px rgba(0, 40, 30, 0.12);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.7);
            transition: 0.1s;
        }
        .btn-wa {
            background: #25D366;
            color: white;
            box-shadow: 0 14px 22px -8px #25D366CC;
            border: none;
        }
        .btn-wa:active {
            background: #1fa955;
            transform: scale(0.98);
        }
        .btn-outline {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(4px);
        }
        .btn-outline:active {
            background: white;
        }
        .error-msg {
            color: #c7372f;
            font-weight: 500;
            font-size: 0.9rem;
            margin: 4px 0 4px 16px;
            min-height: 24px;
        }

        /* KARTU RIWAYAT */
        .history-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 36px;
            padding: 22px 18px 26px;
            box-shadow: 0 20px 30px -12px rgba(0, 60, 50, 0.2);
            border: 1px solid rgba(255,255,255,0.6);
        }
        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 0 4px;
        }
        .history-header h3 {
            color: #0a3847;
            font-weight 700;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .history-actions {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            background: rgba(255,255,255,0.7);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer;
        }
        .history-list {
            background: rgba(255,255,255,0.5);
            border-radius: 28px;
            padding: 12px;
            max-height: 230px;
            overflow-y: auto;
        }
        .history-item {
            background: white;
            border-radius: 50px;
            padding: 12px 18px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.9rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            gap: 6px;
        }
        .item-info {
            flex: 1;
            overflow: hidden;
        }
        .item-info .phone {
            font-weight: 700;
            color: #11596b;
        }
        .item-info small {
            color: #467a8b;
            display: block;
            font-size: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .item-date {
            font-size: 0.65rem;
            color: #568e9f;
            white-space: nowrap;
        }
        .delete-item {
            background: none;
            border: none;
            color: #d44;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 0 4px;
        }
        .empty-history {
            color: #467a8b;
            padding: 18px;
            text-align: center;
            font-style: italic;
        }
        .footer-action-row {
            display: flex;
            gap: 12px;
            margin-top: 18px;
            flex-wrap: wrap;
        }
        .mini-btn {
            background: #26778b;
            border: none;
            color: white;
            padding: 12px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            flex: 1;
            justify-content: center;
            cursor: pointer;
        }
        .mini-btn.light {
            background: #eaf3f7;
            color: #115262;
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- KARTU UTAMA (CHAT) -->
        <div class="card">
            <div class="header-row">
                <div class="wa-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M19.077 4.928C17.191 3.041 14.683 2 12.006 2 6.798 2 2.548 6.193 2.54 11.393c-.003 1.747.456 3.457 1.328 4.984L2.25 21.75l5.428-1.568c1.473.819 3.128 1.252 4.815 1.254h.004c5.193 0 9.456-4.195 9.464-9.396.004-2.51-.972-4.87-2.86-6.758l-.024-.023zM12.02 20.204h-.003c-1.488 0-2.943-.398-4.203-1.15l-.302-.18-3.26.943.98-3.165-.174-.309a8.174 8.174 0 0 1-1.264-4.428c.007-4.517 3.684-8.19 8.21-8.19 2.19 0 4.25.855 5.8 2.406 1.548 1.55 2.4 3.609 2.397 5.794-.007 4.517-3.684 8.19-8.181 8.19z"/>
                    </svg>
                </div>
                <div class="title-group">
                    <h1>WA Mobile</h1>
                    <span class="db-indicator">💾 IndexedDB aktif</span>
                </div>
            </div>

            <!-- INPUT NOMOR -->
            <div class="input-section">
                <span class="label">Nomor tujuan</span>
                <div class="phone-field">
                    <span class="country-code" id="countryCodeDisplay">+62</span>
                    <input type="tel" id="phoneInput" placeholder="812 3456 7890" value="81234567890" inputmode="numeric">
                </div>
                <div class="chip-row" id="countryChips">
                    <span class="chip active" data-code="62">🇮🇩 +62</span>
                    <span class="chip" data-code="1">🇺🇸 +1</span>
                    <span class="chip" data-code="44">🇬🇧 +44</span>
                    <span class="chip" data-code="91">🇮🇳 +91</span>
                    <span class="chip" data-code="60">🇲🇾 +60</span>
                    <span class="chip" data-code="65">🇸🇬 +65</span>
                </div>
            </div>

            <!-- PESAN -->
            <textarea id="messageInput" class="message-area" rows="2" placeholder="Tulis pesan...">Halo! Saya chat via WA tanpa simpan kontak.</textarea>

            <!-- AREA FILE (MOBILE) -->
            <div class="file-card">
                <div class="file-header">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
                    </svg>
                    <span>Lampirkan file (metadata tersimpan)</span>
                </div>
                <div class="file-picker">
                    <label for="realFileInput" class="file-btn">📂 Pilih file</label>
                    <input type="file" id="realFileInput" multiple style="display: none;">
                    <span id="file-info">0 file</span>
                </div>
                <div id="fileListContainer" class="file-list-panel" style="display: none;">
                    <div id="fileItems"></div>
                    <button id="clearAllFilesBtn" class="clear-all-files">Hapus semua file</button>
                </div>
            </div>

            <!-- TOMBOL UTAMA -->
            <div class="button-row">
                <button class="btn btn-wa" id="whatsappBtn">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M16.7 3.3C15 1.6 12.7 0.7 10.2 0.7c-4.9 0-8.9 4-8.9 8.9 0 1.6 0.4 3.1 1.2 4.5L1.3 18.7l4.8-1.3c1.3 0.7 2.8 1.1 4.3 1.1h0 0c4.9 0 8.9-4 8.9-8.9 0-2.4-0.9-4.6-2.6-6.3zM10.2 17.2h0c-1.4 0-2.7-0.4-3.8-1.1l-0.3-0.2-2.9 0.8 0.8-2.8-0.2-0.3c-0.7-1.1-1.1-2.5-1.1-3.9 0-4 3.3-7.3 7.3-7.3 2 0 3.8 0.8 5.2 2.2 1.4 1.4 2.2 3.2 2.2 5.2 0 4-3.3 7.3-7.3 7.3zM13.7 11.1c-0.2-0.1-1.3-0.6-1.6-0.8-0.2-0.1-0.4-0.1-0.5 0.1-0.1 0.2-0.6 0.8-0.7 1-0.1 0.1-0.2 0.2-0.5 0.1-0.8-0.3-1.5-0.7-2.1-1.4-0.7-0.8-1.2-1.8-1.4-2.1-0.1-0.2 0-0.3 0.1-0.4 0.1-0.1 0.2-0.2 0.3-0.3 0.1-0.1 0.2-0.2 0.2-0.4 0-0.1 0-0.3-0.1-0.4-0.1-0.1-0.5-1.2-0.7-1.6-0.2-0.4-0.4-0.4-0.5-0.4-0.1 0-0.3 0-0.4 0-0.1 0-0.3 0.1-0.5 0.3-0.2 0.2-0.7 0.7-0.7 1.7 0 1 0.7 2 0.9 2.2 0.1 0.1 1.5 2.3 3.6 3.2 2.1 0.9 2.1 0.6 2.5 0.5 0.4 0 1.1-0.4 1.3-0.9 0.2-0.5 0.2-0.9 0.1-1-0.1-0.1-0.2-0.1-0.4-0.2z"/>

                    Kirim & Simpan
                </button>
                <button class="btn btn-outline" id="resetBtn">↺ Reset</button>
            </div>
            <div id="errorMsg" class="error-msg"></div>
        </div>

        <!-- KARTU RIWAYAT INDEXEDDB (MOBILE) -->
        <div class="history-card">
            <div class="history-header">
                <h3>📋 Riwayat</h3>
                <div class="history-actions">
                    <button class="icon-btn" id="refreshHistoryBtn">↻</button>
                </div>
            </div>
            <div id="historyList" class="history-list">
                <div class="empty-history">Memuat riwayat...</div>
            </div>
            <div class="footer-action-row">
                <button class="mini-btn" id="clearHistoryBtn"><span>🗑</span> Hapus semua</button>
                <button class="mini-btn light" id="backupHistoryBtn"><span>📥</span> Backup</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ----- INDEXEDDB (sama seperti sebelumnya, dioptimalkan untuk android) -----
            const DB_NAME = 'WAHistoryDB';
            const STORE_NAME = 'chats';
            const DB_VERSION = 1;
            let dbInstance = null;

            function openDB() {
                return new Promise((resolve, reject) => {
                    if (dbInstance) return resolve(dbInstance);
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        dbInstance = request.result;
                        resolve(dbInstance);
                    };
                    request.onupgradeneeded = (ev) => {
                        const db = ev.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                            store.createIndex('timestamp', 'timestamp', { unique: false });
                        }
                    };
                });
            }

            async function addHistoryEntry(entry) {
                try {
                    const db = await openDB();
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    store.add(entry);
                } catch (e) { console.warn(e); }
            }

            async function getAllHistory() {
                try {
                    const db = await openDB();
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const store = tx.objectStore(STORE_NAME);
                    const request = store.getAll();
                    return new Promise((resolve) => {
                        request.onsuccess = () => resolve(request.result || []);
                        request.onerror = () => resolve([]);
                    });
                } catch { return []; }
            }

            async function clearAllHistory() {
                try {
                    const db = await openDB();
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    store.clear();
                } catch (e) {}
            }

            async function deleteHistoryItem(id) {
                try {
                    const db = await openDB();
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    store.delete(id);
                } catch (e) {}
            }

            // ----- ELEMEN UI (mobile) -----
            const phoneInput = document.getElementById('phoneInput');
            const countryCodeSpan = document.getElementById('countryCodeDisplay');
            const countryChips = document.querySelectorAll('.chip');
            const messageInput = document.getElementById('messageInput');
            const waBtn = document.getElementById('whatsappBtn');
            const resetBtn = document.getElementById('resetBtn');
            const errorDiv = document.getElementById('errorMsg');

            const realFileInput = document.getElementById('realFileInput');
            const fileInfoSpan = document.getElementById('file-info');
            const fileListContainer = document.getElementById('fileListContainer');
            const fileItemsDiv = document.getElementById('fileItems');
            const clearAllBtn = document.getElementById('clearAllFilesBtn');

            const historyListDiv = document.getElementById('historyList');
            const refreshBtn = document.getElementById('refreshHistoryBtn');
            const clearHistoryBtn = document.getElementById('clearHistoryBtn');
            const backupBtn = document.getElementById('backupHistoryBtn');

            // state
            let selectedCountryCode = '62';
            let selectedFiles = [];

            // fungsi aktif chip
            function setActiveChip(code) {
                countryChips.forEach(ch => {
                    ch.classList.toggle('active', ch.dataset.code === code);
                });
                countryCodeSpan.textContent = '+' + code;
            }

            function cleanNumber(raw) { return raw.replace(/\D/g, ''); }
            function buildFullNumber(localNumber, countryCode) {
                const digits = cleanNumber(localNumber);
                let normalized = digits.startsWith('0') ? digits.substring(1) : digits;
                return normalized.startsWith(countryCode) ? normalized : countryCode + normalized;
            }

            function generateWAUrl() {
                const rawPhone = phoneInput.value.trim();
                if (!rawPhone) { errorDiv.textContent = 'Isi nomor telepon'; return null; }
                const fullNumber = buildFullNumber(rawPhone, selectedCountryCode);
                if (fullNumber.length < 8 || fullNumber.length > 15) { errorDiv.textContent = 'Nomor tidak valid'; return null; }
                const message = messageInput.value.trim();
                let url = `https://wa.me/${fullNumber}`;
                if (message) url += `?text=${encodeURIComponent(message)}`;
                errorDiv.textContent = '';
                return url;
            }

            // render file list (mobile friendly)
            function renderFileList() {
                if (selectedFiles.length === 0) {
                    fileInfoSpan.textContent = '0 file';
                    fileListContainer.style.display = 'none';
                    return;
                }
                fileInfoSpan.textContent = `${selectedFiles.length} file`;
                fileListContainer.style.display = 'block';
                let html = '';
                selectedFiles.forEach((file, idx) => {
                    let size = (file.size / 1024).toFixed(0);
                    html += `<div class="file-item">
                        <span>📄 ${file.name.length > 20 ? file.name.substring(0,15)+'…' : file.name} (${size} KB)</span>
                        <button class="remove-file" data-index="${idx}">✕</button>
                    </div>`;
                });
                fileItemsDiv.innerHTML = html;
                document.querySelectorAll('.remove-file').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const idx = parseInt(btn.dataset.index, 10);
                        selectedFiles.splice(idx, 1);
                        renderFileList();
                    });
                });
            }

            function clearAllSelectedFiles() {
                selectedFiles = [];
                realFileInput.value = '';
                renderFileList();
            }

            // Tampilkan riwayat
            async function loadAndDisplayHistory() {
                try {
                    const history = await getAllHistory();
                    if (!history.length) {
                        historyListDiv.innerHTML = '<div class="empty-history">Belum ada riwayat</div>';
                        return;
                    }
                    history.sort((a,b) => b.timestamp - a.timestamp);
                    let html = '';
                    history.forEach(item => {
                        const date = new Date(item.timestamp).toLocaleString('id', { hour12: false, hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit' });
                        html += `<div class="history-item">
                            <div class="item-info">
                                <span class="phone">${item.phone}</span>
                                <small>${item.preview || ''} ${item.fileCount ? ' ('+item.fileCount+' file)' : ''}</small>
                            </div>
                            <span class="item-date">${date}</span>
                            <button class="delete-item" data-id="${item.id}">✕</button>
                        </div>`;
                    });
                    historyListDiv.innerHTML = html;
                    document.querySelectorAll('.delete-item').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const id = Number(btn.dataset.id);
                            await deleteHistoryItem(id);
                            loadAndDisplayHistory();
                        });
                    });
                } catch { historyListDiv.innerHTML = '<div class="empty-history">Gagal muat</div>'; }
            }

            async function saveCurrentChatToHistory() {
                const rawPhone = phoneInput.value.trim();
                if (!rawPhone) return;
                const fullNumber = buildFullNumber(rawPhone, selectedCountryCode);
                const message = messageInput.value.trim();
                const preview = message.length > 30 ? message.substring(0,30)+'…' : (message || '(kosong)');
                const fileCount = selectedFiles.length;
                const entry = { phone: fullNumber, preview, fileCount, timestamp: Date.now() };
                await addHistoryEntry(entry);
                loadAndDisplayHistory();
            }

            // --- EVENT LISTENERS (mobile) ---
            countryChips.forEach(chip => {
                chip.addEventListener('click', function() {
                    selectedCountryCode = this.dataset.code;
                    setActiveChip(selectedCountryCode);
                });
            });

            realFileInput.addEventListener('change', function(e) {
                selectedFiles = Array.from(e.target.files);
                renderFileList();
            });

            clearAllBtn.addEventListener('click', clearAllSelectedFiles);

            resetBtn.addEventListener('click', function() {
                phoneInput.value = '81234567890';
                messageInput.value = 'Halo! Saya chat via WA tanpa simpan kontak.';
                selectedCountryCode = '62';
                setActiveChip('62');
                errorDiv.textContent = '';
                clearAllSelectedFiles();
            });

            waBtn.addEventListener('click', async function() {
                const url = generateWAUrl();
                if (!url) return;
                await saveCurrentChatToHistory();
                if (selectedFiles.length > 0) alert(`📎 ${selectedFiles.length} file siap. Lampirkan manual di WA.`);
                window.open(url, '_blank');
            });

            refreshBtn.addEventListener('click', loadAndDisplayHistory);
            clearHistoryBtn.addEventListener('click', async () => {
                if (confirm('Hapus semua riwayat?')) {
                    await clearAllHistory();
                    loadAndDisplayHistory();
                }
            });
            backupBtn.addEventListener('click', async () => {
                const history = await getAllHistory();
                const dataStr = JSON.stringify(history, null, 2);
                const blob = new Blob([dataStr], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `wa-history-${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
            });

            // inisialisasi
            setActiveChip('62');
            renderFileList();
            loadAndDisplayHistory();
        })();
    </script>
</body>
</html>
